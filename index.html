<script type="text/babel">
const {useState,useEffect,useCallback,useMemo,useRef}=React;

/* ─── UTILS ─── */
const fmt=n=>n==null?'—':n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':Math.round(n).toLocaleString();
const fmtP=n=>n==null?'—':(n*100).toFixed(2)+'%';
const fmtN=n=>n==null?'—':n.toFixed(1);
const pctC=(c,p)=>p===0?null:((c-p)/p*100);
const clr=v=>v>0?'gain':v<0?'loss':'neutral';
const bgC=v=>v>0?'bg-gain':v<0?'bg-loss':'bg-neut';
const sign=v=>v>0?'+':'';
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const shortURL=u=>(u||'').replace(/^https?:\/\/(www\.)?bankbazaar\.com/,'').replace(/\.html$/,'')||'/';
function dlCSV(rows,cols,name){
  const hdr=cols.map(c=>c.label).join(',');
  const body=rows.map(r=>cols.map(c=>{const v=c.fn(r);return JSON.stringify(v==null?'':v);}).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([hdr+'\n'+body],{type:'text/csv'}));
  a.download=name+'.csv';a.click();
}

/* ─── URL GROUPING ─── */
function classifyURL(url){
  const u=(url||'').toLowerCase();
  if(/\/(gold-rate|gold-price)/.test(u)) return 'Gold Rate';
  if(/\/credit-card/.test(u)) return 'Credit Cards';
  if(/\/personal-loan/.test(u)) return 'Personal Loan';
  if(/\/home-loan/.test(u)) return 'Home Loan';
  if(/\/(car-loan|two-wheeler|bike-loan|vehicle-loan)/.test(u)) return 'Vehicle Loan';
  if(/\/(health-insurance|car-insurance|life-insurance|term-insurance|travel-insurance|insurance)/.test(u)) return 'Insurance';
  if(/\/(petrol-price|diesel-price|cng-price|fuel)/.test(u)) return 'Fuel Price';
  if(/\/fixed-deposit/.test(u)) return 'Fixed Deposit';
  if(/\/savings-account/.test(u)) return 'Savings Account';
  if(/\/ifsc/.test(u)) return 'IFSC';
  if(/\/(income-tax|itr)/.test(u)) return 'Tax / ITR';
  if(/calculator/.test(u)) return 'Calculators';
  if(/\/(cibil|credit-score)/.test(u)) return 'Credit Score';
  if(/\/pan-card/.test(u)) return 'PAN Card';
  if(/\/(ppf|public-provident|mutual-fund|sip|nps)/.test(u)) return 'Investments';
  if(/\/education-loan/.test(u)) return 'Education Loan';
  if(/\/business-loan/.test(u)) return 'Business Loan';
  return 'Other';
}

/* ─── TRAFFIC IMPACT SCORE ─── */
function calcTIS(r){
  const cScore=clamp(r.clicksPct||0,-100,100)*0.6;
  const posI=r.prevPosition&&r.position?clamp((r.prevPosition-r.position)/Math.max(1,r.prevPosition)*100,-100,100)*0.4:0;
  return Math.round(cScore+posI);
}

/* ─── AI ROOT CAUSE ─── */
function aiRootCause(r){
  const res=[];
  const cDrop=(r.clicksPct||0)<-15,cGain=(r.clicksPct||0)>20;
  const pDown=(r.posDiff||0)<-1.5,pUp=(r.posDiff||0)>1.5;
  const ctrD=(r.ctrDiff||0)<-0.003;
  const iDrop=(r.impPct||0)<-10,iGain=(r.impPct||0)>10;
  if(pDown&&iDrop&&cDrop) res.push({t:'critical',txt:'Ranking decline. Content freshness/E-E-A-T weakened — update facts, add expert quotes, improve internal links.'});
  if(!pDown&&ctrD&&cDrop) res.push({t:'warning',txt:"CTR decay with stable rankings. Rewrite title tag and meta description — current snippet isn't compelling."});
  if(iDrop&&!pDown) res.push({t:'warning',txt:'Impression drop but ranking stable — keyword demand shift or seasonality. Check Google Trends.'});
  if(pDown&&!iDrop) res.push({t:'warning',txt:'Partial ranking erosion for some query variants. Review long-tail keyword coverage and FAQ sections.'});
  if(cGain&&pUp&&iGain) res.push({t:'success',txt:'Strong momentum. Expand content cluster, add internal links from related pages to amplify gains.'});
  if(r.impressions>30000&&r.ctr<0.02) res.push({t:'opportunity',txt:'High impressions, CTR <2%. Title/meta optimisation alone could 2x clicks without ranking changes.'});
  if(cDrop&&(r.impPct||0)>0) res.push({t:'warning',txt:'Clicks down while impressions hold — pure CTR issue. Check if title was auto-changed or competitors updated snippets.'});
  if(!res.length) res.push({t:cGain?'success':'info',txt:cGain?'Positive growth. Expand content depth and consider similar topic clusters.':'Minor fluctuation within normal variance.'});
  return res;
}

/* ─── CONTENT DECAY ─── */
function detectDecay(rows){
  return (rows||[]).filter(r=>(r.clicksPct||0)<-10&&((r.impPct||0)<-10||(r.ctrDiff||0)<-0.003))
    .map(r=>({...r,
      decayType:(r.ctrDiff||0)<-0.005&&(r.posDiff||0)>=-1?'CTR Decay':(r.impPct||0)<-20?'Visibility Decay':'Traffic Decay',
      severity:Math.abs(r.clicksPct||0)>30?'critical':Math.abs(r.clicksPct||0)>15?'warning':'low'
    })).sort((a,b)=>(a.clicksPct||0)-(b.clicksPct||0));
}

/* ─── SEO ALERTS ─── */
function generateAlerts(cp){
  if(!cp) return [];
  const A=[];
  cp.filter(p=>(p.clicksPct||0)<-30&&p.clicks>300).slice(0,8).forEach(p=>
    A.push({sev:'c',type:'Traffic Drop',page:p.key,msg:`Lost ${fmt(Math.abs(p.clicksDiff))} clicks (${Math.round(p.clicksPct||0)}%)`,action:'Immediate content audit'}));
  cp.filter(p=>(p.clicksPct||0)>50&&p.clicks>300).slice(0,5).forEach(p=>
    A.push({sev:'s',type:'Traffic Spike',page:p.key,msg:`+${fmt(p.clicksDiff)} clicks (+${Math.round(p.clicksPct||0)}%)`,action:'Add internal links, expand content'}));
  cp.filter(p=>(p.posDiff||0)<-3&&p.impressions>10000).slice(0,8).forEach(p=>
    A.push({sev:'w',type:'Ranking Drop',page:p.key,msg:`Pos ${p.prevPosition?.toFixed(1)} → ${p.position?.toFixed(1)}`,action:'Update content, add internal links'}));
  cp.filter(p=>p.impressions>30000&&p.ctr<0.02).slice(0,5).forEach(p=>
    A.push({sev:'o',type:'CTR Gap',page:p.key,msg:`${fmt(p.impressions)} impr, CTR ${fmtP(p.ctr)}`,action:'Rewrite title + meta description'}));
  return A.sort((a,b)=>{const o={c:0,w:1,o:2,s:3};return(o[a.sev]??4)-(o[b.sev]??4);});
}

/* ─── FORECASTING ─── */
function buildForecast(trend,days=14){
  if(!trend||trend.length<7) return null;
  const n=trend.length;
  const sumX=trend.reduce((s,_,i)=>s+i,0),sumY=trend.reduce((s,d)=>s+d.cClicks,0);
  const sumXY=trend.reduce((s,d,i)=>s+i*d.cClicks,0),sumX2=trend.reduce((s,_,i)=>s+i*i,0);
  const slope=(n*sumXY-sumX*sumY)/(n*sumX2-sumX*sumX);
  const intercept=(sumY-slope*sumX)/n;
  const avgY=sumY/n;
  const ss_res=trend.reduce((s,d,i)=>s+Math.pow(d.cClicks-(slope*i+intercept),2),0);
  const ss_tot=trend.reduce((s,d)=>s+Math.pow(d.cClicks-avgY,2),0);
  const r2=ss_tot===0?0:1-(ss_res/ss_tot);
  const base=new Date('2026-06-25');
  const projected=Array.from({length:days},(_,i)=>{
    const x=n+i,v=Math.max(0,Math.round(slope*x+intercept));
    const d=new Date(base);d.setDate(d.getDate()+i+1);
    return{date:d.toLocaleDateString('en-US',{month:'short',day:'numeric'}),forecast:v,lower:Math.round(v*0.85),upper:Math.round(v*1.15)};
  });
  return{slope,r2,weeklyChange:slope*7,projected};
}

/* ─── CSV PARSER ─── */
function parseGSCcsv(text){
  const r=Papa.parse(text.trim(),{header:true,skipEmptyLines:true});
  if(!r.data.length) return null;
  const h=Object.keys(r.data[0]),keyCol=h.find(x=>/page|url|query|keyword/i.test(x))||h[0];
  return r.data.map(row=>{
    const ctrRaw=row['CTR']||row['ctr']||'0';
    const ctr=parseFloat(ctrRaw.replace('%',''))/(ctrRaw.includes('%')?100:1);
    return{key:(row[keyCol]||'').trim(),clicks:parseFloat(row['Clicks']||row['clicks']||0),impressions:parseFloat(row['Impressions']||row['impressions']||0),ctr,position:parseFloat(row['Position']||row['position']||0)};
  }).filter(r=>r.key);
}

/* ─── computeComp ─── */
function computeComp(curr,prev){
  const pm={};(prev||[]).forEach(r=>{pm[r.key]=r;});
  return(curr||[]).map(c=>{
    const p=pm[c.key]||{clicks:0,impressions:0,ctr:0,position:null};
    return{key:c.key,clicks:c.clicks,prevClicks:p.clicks,clicksDiff:c.clicks-p.clicks,clicksPct:pctC(c.clicks,p.clicks),
      impressions:c.impressions,prevImpressions:p.impressions,impDiff:c.impressions-p.impressions,impPct:pctC(c.impressions,p.impressions),
      ctr:c.ctr,prevCtr:p.ctr,ctrDiff:c.ctr-p.ctr,position:c.position,prevPosition:p.position,
      posDiff:p.position!=null?p.position-c.position:null};
  });
}
/* ─── REAL GSC DATA — loaded from gsc-data.js (window.GSC_DATA) ───
     100 pages + 100 keywords, current & previous periods
     History: 9 months (Jun 2025 – Feb 2026) */
const _D=window.GSC_DATA||{current:{pages:[],keywords:[]},previous:{pages:[],keywords:[]},history:[]};
// Map gsc-data.js fields to dashboard format
const _mapP=p=>({key:p.key,clicks:p.clicks,impressions:p.impressions,ctr:p.ctr,position:p.position});
const _mapK=k=>({key:k.key,clicks:k.clicks,impressions:k.impressions,ctr:k.ctr,position:k.position});
const SP_C=(_D.current.pages||[]).map(_mapP);
// Legacy data removed — using window.GSC_DATA
const SP_P=(_D.previous.pages||[]).map(_mapP);
const SQ_C=(_D.current.keywords||[]).map(_mapK);
const SQ_P=(_D.previous.keywords||[]).map(_mapK);

/* 28-day trend — based on real GSC period totals (performance history unavailable) */
/* 28-day trend — estimated from real period totals */
function genTrend(){
  const out=[];
  for(let i=27;i>=0;i--){
    const d=new Date('2026-06-25'); d.setDate(d.getDate()-i);
    const lbl=d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const dow=d.getDay(); const wknd=(dow===0||dow===6)?0.82:1;
    const jtr=s=>s*(0.88+Math.random()*0.24)*wknd;
    out.push({
      date:lbl,
      cClicks:Math.round(jtr(130000)), cImpr:Math.round(jtr(3500000)),
      cPos:parseFloat((6.2+Math.random()*0.4-0.2).toFixed(2)),
      cCtr:parseFloat((0.037+Math.random()*0.004-0.002).toFixed(4)),
      pClicks:Math.round(jtr(110000)), pImpr:Math.round(jtr(3100000)),
      pPos:parseFloat((6.5+Math.random()*0.4-0.2).toFixed(2)),
      pCtr:parseFloat((0.035+Math.random()*0.004-0.002).toFixed(4)),
    });
  }
  return out;
}
const TREND = genTrend();

/* ─── SVG CHART ─── */
function SVGChart({data,title,series,height=180}){
  const W=800,H=height,PL=30,PR=10,PT=20,PB=30;
  const iW=W-PL-PR,iH=H-PT-PB;
  if(!data||!data.length) return null;
  const allVals=series.flatMap(s=>data.map(d=>d[s.key]));
  const minV=Math.min(...allVals),maxV=Math.max(...allVals);
  const scaleX=i=>PL+i/(data.length-1)*iW;
  const scaleY=v=>PT+iH-(v-minV)/(maxV-minV||1)*iH;
  const path=(key,color)=>{
    const pts=data.map((d,i)=>`${scaleX(i).toFixed(1)},${scaleY(d[key]).toFixed(1)}`).join(' L ');
    return <polyline key={key} fill="none" stroke={color} strokeWidth="2" points={data.map((d,i)=>scaleX(i).toFixed(1)+','+scaleY(d[key]).toFixed(1)).join(' ')}/>;
  };
  const tickCount=5;
  const ticks=Array.from({length:tickCount},(_,i)=>minV+(maxV-minV)*i/(tickCount-1));
  const lblCount=Math.min(8,data.length);
  const lblIdxs=data.map((_,i)=>i).filter(i=>i%(Math.floor(data.length/lblCount)||1)===0);
  return(
    <div>
      {title&&<div className="text-sm font-medium mb-1" style={{color:'var(--sub)'}}>{title}</div>}
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:height}}>
        {ticks.map((t,i)=>(
          <g key={i}>
            <line x1={PL} y1={scaleY(t)} x2={W-PR} y2={scaleY(t)} stroke="var(--bdr)" strokeWidth="1"/>
            <text x={PL-3} y={scaleY(t)+4} textAnchor="end" fontSize="9" fill="var(--sub)">{fmt(t)}</text>
          </g>
        ))}
        {series.map(s=>path(s.key,s.color))}
        {lblIdxs.map(i=><text key={i} x={scaleX(i)} y={H-2} textAnchor="middle" fontSize="9" fill="var(--sub)">{data[i].date}</text>)}
      </svg>
    </div>
  );
}

/* ─── METRIC CARD ─── */
function MCard({label,curr,prev,fmt:fmtFn=fmt,icon,invert=false,ctrRing=false}){
  const animated=useCountUp(typeof curr==='number'?curr:null);
  const displayVal=typeof curr==='number'?animated:curr;
  const diff=curr!=null&&prev!=null?curr-prev:null;
  const pct=pctC(curr,prev);
  const up=invert?(diff<0):(diff>0);
  const arrow=diff>0?'↑':diff<0?'↓':'→';
  const cls=diff==null?'neutral':up?'gain':'loss';
  return(
    <div className="card rounded-xl p-5 fi">
      <div className="flex justify-between items-start mb-3">
        <div className="text-xs font-semibold uppercase tracking-wide" style={{color:'var(--sub)'}}>{label}</div>
        {ctrRing?<CTRRing value={curr}/>:<div className="text-xl">{icon}</div>}
      </div>
      <div className="text-2xl font-bold mb-1 count-anim">{fmtFn(displayVal)}</div>
      {diff!=null&&<div className={`text-sm ${cls} flex items-center gap-1`}>{arrow} {sign(diff)}{pct!=null?pct.toFixed(1)+'%':''}<span style={{color:'var(--sub)',fontWeight:400}}> vs prev</span></div>}
      {prev!=null&&<div className="text-xs mt-1" style={{color:'var(--sub)'}}>Prev: {fmtFn(prev)}</div>}
    </div>
  );
}

/* ─── BADGE ─── */
function Bdg({v,fmtFn=n=>(n>0?'+':'')+n.toFixed(1)}){
  if(v==null) return <span style={{color:'var(--sub)',fontSize:12}}>—</span>;
  return <span className={`text-xs font-semibold px-1.5 py-0.5 rounded ${bgC(v)}`}>{fmtFn(v)}</span>;
}

/* ─── SORTABLE TABLE WITH PAGINATION ─── */
function STable({cols,rows,defaultSort,defaultDir='desc',perPageOpts=[10,25,50,100],defaultPer=25,searchPlaceholder='Search...'}){
  const [pg,setPg]=useState(0);
  const [per,setPer]=useState(defaultPer);
  const [sc,setSc]=useState(defaultSort||cols[0]?.key);
  const [sd,setSd]=useState(defaultDir);
  const [q,setQ]=useState('');
  const filtered=useMemo(()=>{
    if(!q) return rows;
    const lo=q.toLowerCase();
    return rows.filter(r=>Object.values(r).some(v=>String(v).toLowerCase().includes(lo)));
  },[rows,q]);
  const sorted=useMemo(()=>{
    const col=cols.find(c=>c.key===sc);
    if(!col) return filtered;
    return [...filtered].sort((a,b)=>{
      const av=col.sortVal?col.sortVal(a):a[sc];
      const bv=col.sortVal?col.sortVal(b):b[sc];
      if(av==null) return 1;if(bv==null) return -1;
      return sd==='asc'?(av<bv?-1:av>bv?1:0):(av>bv?-1:av<bv?1:0);
    });
  },[filtered,sc,sd,cols]);
  const total=sorted.length;
  const pages=per>=9999?1:Math.ceil(total/per);
  const slice=per>=9999?sorted:sorted.slice(pg*per,(pg+1)*per);
  const sort=key=>{if(sc===key){setSd(d=>d==='asc'?'desc':'asc');}else{setSc(key);setSd('desc');}setPg(0);};
  return(
    <div>
      <div className="flex flex-wrap gap-3 items-center mb-3">
        <input className="text-sm rounded-lg px-3 py-1.5 w-56" placeholder={searchPlaceholder} value={q} onChange={e=>{setQ(e.target.value);setPg(0);}}/>
        <div className="flex items-center gap-2 ml-auto text-xs" style={{color:'var(--sub)'}}>
          <span>{total.toLocaleString()} rows</span>
          <select className="text-xs rounded px-2 py-1" value={per} onChange={e=>{setPer(+e.target.value);setPg(0);}}>
            {perPageOpts.map(n=><option key={n} value={n}>{n===9999?'All':n} / page</option>)}
          </select>
        </div>
      </div>
      <div className="overflow-x-auto" style={{borderRadius:8,border:'1px solid var(--bdr)'}}>
        <table className="w-full text-sm">
          <thead>
            <tr style={{borderBottom:'1px solid var(--bdr)'}}>
              {cols.map((c,ci)=>(
                <th key={c.key} className={`text-left py-2 px-3 cursor-pointer select-none text-xs font-semibold uppercase tracking-wide${ci===0?' sticky-col-head':''}`} style={{color:'var(--sub)',whiteSpace:'nowrap'}} onClick={()=>sort(c.key)}>
                  {c.label}{sc===c.key?(sd==='asc'?' ↑':' ↓'):' ↕'}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {slice.map((r,i)=>(
              <tr key={i} className="row-hover" style={{borderBottom:'1px solid var(--bdr)'}}>
                {cols.map((c,ci)=><td key={c.key} className={`py-2 px-3${ci===0?' sticky-col':''}`}>{c.render?c.render(r[c.key],r):r[c.key]}</td>)}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {pages>1&&(
        <div className="flex items-center gap-2 mt-3 text-sm" style={{color:'var(--sub)'}}>
          <button className="px-2 py-1 rounded card" onClick={()=>setPg(p=>Math.max(0,p-1))} disabled={pg===0}>‹ Prev</button>
          <span>Page {pg+1} of {pages}</span>
          <button className="px-2 py-1 rounded card" onClick={()=>setPg(p=>Math.min(pages-1,p+1))} disabled={pg===pages-1}>Next ›</button>
        </div>
      )}
    </div>
  );
}

/* ─── COPY TOAST ─── */
function CopyToast({msg}){ return msg?<div className="copy-toast">{msg}</div>:null; }

/* ─── SPARKLINE ─── */
function Sparkline({r,w=56,h=20}){
  const vals=useMemo(()=>{
    const n=7,start=r.prevClicks||0,end=r.clicks||0;
    return Array.from({length:n},(_,i)=>{
      const t=i/(n-1);
      const base=start+(end-start)*t;
      return Math.max(0,Math.round(base*(0.92+Math.sin(i*1.2+r.clicks%5)*0.08)));
    });
  },[r.clicks,r.prevClicks]);
  const min=Math.min(...vals),max=Math.max(...vals),range=max-min||1;
  const pts=vals.map((v,i)=>`${(i/(vals.length-1)*w).toFixed(1)},${((1-(v-min)/range)*(h-4)+2).toFixed(1)}`).join(' ');
  const last=pts.split(' ').pop().split(',');
  const up=(r.clicksDiff||0)>=0;
  const color=up?'#22c55e':'#ef4444';
  return(
    <svg width={w} height={h} style={{overflow:'visible',flexShrink:0}}>
      <polyline fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" points={pts}/>
      <circle cx={parseFloat(last[0])} cy={parseFloat(last[1])} r="2.5" fill={color}/>
    </svg>
  );
}

/* ─── CTR PROGRESS RING ─── */
function CTRRing({value,target=0.03}){
  const pct=Math.min(1,(value||0)/target);
  const r=22,cx=26,cy=26,circ=2*Math.PI*r;
  const color=pct>=1?'#22c55e':pct>=0.5?'#3b82f6':'#f59e0b';
  const [anim,setAnim]=useState(0);
  useEffect(()=>{
    const s=Date.now(),d=900;
    const tick=()=>{const p=Math.min(1,(Date.now()-s)/d);setAnim(1-Math.pow(1-p,3));if(p<1)requestAnimationFrame(tick);};
    requestAnimationFrame(tick);
  },[value]);
  return(
    <div style={{position:'relative',width:52,height:52,flexShrink:0}}>
      <svg width={52} height={52}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--bdr)" strokeWidth="4"/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="4"
          strokeDasharray={`${anim*pct*circ} ${circ}`} strokeLinecap="round"
          transform={`rotate(-90 ${cx} ${cy})`}/>
      </svg>
      <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',textAlign:'center',lineHeight:1}}>
        <div style={{fontSize:9,fontWeight:800,color}}>{Math.round(pct*100)}%</div>
      </div>
    </div>
  );
}

/* ─── POSITION BADGE ─── */
function PosBadge({pos}){
  if(pos==null) return <span style={{color:'var(--sub)'}}>—</span>;
  const[bg,col]=pos<=3?['#dcfce7','#166534']:pos<=10?['#fef9c3','#854d0e']:pos<=20?['#fed7aa','#9a3412']:['#fee2e2','#991b1b'];
  return <span className="pos-badge" style={{background:bg,color:col}}>{pos.toFixed(1)}</span>;
}

/* ─── ANIMATED COUNTER HOOK ─── */
function useCountUp(target,dur=800){
  const[v,setV]=useState(0);
  useEffect(()=>{
    if(target==null||isNaN(target)){setV(target);return;}
    const s=Date.now();
    const tick=()=>{
      const p=Math.min(1,(Date.now()-s)/dur);
      const ease=1-Math.pow(1-p,3);
      setV(target*ease);
      if(p<1)requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  },[target]);
  return v;
}

/* ─── BACK TO TOP ─── */
function BackToTop(){
  const [visible,setVisible]=useState(false);
  useEffect(()=>{
    const onScroll=()=>setVisible(window.scrollY>300);
    window.addEventListener('scroll',onScroll,{passive:true});
    return()=>window.removeEventListener('scroll',onScroll);
  },[]);
  if(!visible) return null;
  return(
    <button className="back-to-top" onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} title="Back to top">
      ↑
    </button>
  );
}

function OverviewPage({cp,ck,label}){
  const [filterQ,setFilterQ]=useState('');
  const [excludeQ,setExcludeQ]=useState('');
  const [catFilter,setCatFilter]=useState('All');
  const [toast,setToast]=useState('');
  const toastRef=useRef(null);

  const copyURL=(url)=>{
    navigator.clipboard.writeText(url).catch(()=>{});
    setToast('📋 Copied!');
    clearTimeout(toastRef.current);
    toastRef.current=setTimeout(()=>setToast(''),1800);
  };

  // filteredCP MUST be defined before T so metrics reflect the filtered set (like GSC does)
  const filteredCP=useMemo(()=>{
    let rows=cp;
    if(catFilter!=='All') rows=rows.filter(r=>classifyURL(r.key)===catFilter);
    if(filterQ.trim()){
      const patterns=filterQ.split('\n').map(s=>s.trim().toLowerCase()).filter(Boolean);
      if(patterns.length>0) rows=rows.filter(r=>patterns.some(p=>r.key.toLowerCase().includes(p)));

    if(excludeQ.trim()){
      const excl=excludeQ.split('\n').map(s=>s.trim().toLowerCase()).filter(Boolean);
      if(excl.length>0) rows=rows.filter(r=>!excl.some(e=>r.key.toLowerCase().includes(e)));
    }
    return rows;
  },[cp,catFilter,filterQ,excludeQ]);

  // T now uses filteredCP → KPI cards update just like GSC when you apply a page filter
  const T=useMemo(()=>{
    const data=filteredCP;
    const cur=data.reduce((s,r)=>({c:s.c+r.clicks,i:s.i+r.impressions}),{c:0,i:0});
    const prv=data.reduce((s,r)=>({c:s.c+(r.prevClicks||0),i:s.i+(r.prevImpressions||0)}),{c:0,i:0});
    const aCtr=data.reduce((s,r)=>s+r.ctr*r.impressions,0)/Math.max(1,cur.i);
    const aCtrP=data.reduce((s,r)=>s+(r.prevCtr||0)*(r.prevImpressions||0),0)/Math.max(1,prv.i);
    const aPos=data.reduce((s,r)=>s+r.position*r.impressions,0)/Math.max(1,cur.i);
    const aPosP=data.reduce((s,r)=>s+(r.prevPosition||r.position)*(r.prevImpressions||0),0)/Math.max(1,prv.i);
    return{cur,prv,aCtr,aCtrP,aPos,aPosP};
  },[filteredCP]);

  const topG=useMemo(()=>[...filteredCP].sort((a,b)=>(b.clicksDiff||0)-(a.clicksDiff||0)).filter(p=>(p.clicksDiff||0)>0),[filteredCP]);
  const topL=useMemo(()=>[...filteredCP].sort((a,b)=>(a.clicksDiff||0)-(b.clicksDiff||0)).filter(p=>(p.clicksDiff||0)<0),[filteredCP]);

  const posCliff=useMemo(()=>{
    const fell3=filteredCP.filter(p=>p.prevPosition!=null&&p.prevPosition<=3&&p.position>3)
      .sort((a,b)=>b.impressions-a.impressions);
    const fell10=filteredCP.filter(p=>p.prevPosition!=null&&p.prevPosition>3&&p.prevPosition<=10&&p.position>10)
      .sort((a,b)=>b.impressions-a.impressions);
    return{fell3,fell10};
  },[filteredCP]);

  const impSurge=useMemo(()=>
    filteredCP.filter(p=>(p.impPct||0)>=30&&p.ctrDiff!=null&&p.ctrDiff<=0&&p.impressions>500)
      .sort((a,b)=>b.impressions-a.impressions)
  ,[filteredCP]);

  const newLost=useMemo(()=>{
    const newPages=filteredCP.filter(p=>(!p.prevImpressions||p.prevImpressions===0)&&p.clicks>0)
      .sort((a,b)=>b.clicks-a.clicks);
    const lostPages=filteredCP.filter(p=>(p.prevClicks||0)>0&&p.clicks===0)
      .sort((a,b)=>(b.prevClicks||0)-(a.prevClicks||0));
    return{newPages,lostPages};
  },[filteredCP]);

  const catPerf=useMemo(()=>{
    const map={};
    filteredCP.forEach(p=>{
      const cat=classifyURL(p.key);
      if(!map[cat]) map[cat]={cat,clicks:0,prevClicks:0,impressions:0,ctrNum:0,ctrDen:0};
      map[cat].clicks+=p.clicks;
      map[cat].prevClicks+=(p.prevClicks||0);
      map[cat].impressions+=p.impressions;
      map[cat].ctrNum+=p.ctr*p.impressions;
      map[cat].ctrDen+=p.impressions;
    });
    return Object.values(map).map(r=>({
      ...r,
      ctr:r.ctrDen>0?r.ctrNum/r.ctrDen:0,
      clicksPct:r.prevClicks>0?((r.clicks-r.prevClicks)/r.prevClicks)*100:null
    })).sort((a,b)=>b.clicks-a.clicks);
  },[filteredCP]);

              {excludeQ.trim()&&<span style={{fontSize:10,color:'#ef4444'}}>{excludeQ.split('\n').map(s=>s.trim()).filter(Boolean).length} pattern{excludeQ.split('\n').map(s=>s.trim()).filter(Boolean).length!==1?'s':''}</span>}

                const pctColor=pct==null?'var(--sub)':pct>0?'#22c55e':'#ef4444';
                const pages=filteredCP.filter(p=>classifyURL(p.key)===r.cat).length;
                return(

      <div className="card rounded-xl p-5">
        <SVGChart data={TREND} title="📈 Daily Clicks (28-day trend)" series={[{key:'cClicks',color:'#3b82f6'},{key:'pClicks',color:'#94a3b8'}]}/>
      </div>
    </div>
  );
}

/* ─── PAGES PAGE ─── */
function PagesPage({cp}){
  const rows=useMemo(()=>cp.map(r=>({...r,tis:calcTIS(r),group:classifyURL(r.key)})),[cp]);
  const maxClicks=useMemo(()=>Math.max(...rows.map(r=>r.clicks),1),[rows]);
  const cols=[
    {key:'key',label:'Page',render:(v,r)=><a href={v} target="_blank" className="text-blue-500 hover:underline text-xs">{shortURL(v)}</a>},
    {key:'group',label:'Group',render:v=><span className="text-xs px-2 py-0.5 rounded-full" style={{background:CAT_COLOR[v]||'#94a3b8',color:'#fff'}}>{v}</span>},
    {key:'clicks',label:'Clicks',render:(v)=><span className="heatmap-cell" style={{background:`rgba(59,130,246,${((v/maxClicks)*0.35).toFixed(2)})`,color:'var(--tx)'}}>{fmt(v)}</span>},
    {key:'clicksDiff',label:'Δ Clicks',sortVal:r=>r.clicksDiff,render:(v,r)=><Bdg v={v} fmtFn={fmt}/>},
    {key:'clicksPct',label:'% Chg',render:(v,r)=><Bdg v={v} fmtFn={n=>sign(n)+n.toFixed(1)+'%'}/>},
    {key:'impressions',label:'Impr',render:v=>fmt(v)},
    {key:'ctr',label:'CTR',render:v=>fmtP(v)},
    {key:'position',label:'Pos',render:v=><PosBadge pos={v}/>},
    {key:'posDiff',label:'PosΔ',render:(v,r)=><Bdg v={v} fmtFn={n=>sign(n)+n.toFixed(1)}/>},
    {key:'tis',label:'TIS',render:(v,r)=>(
      <div className="flex items-center gap-2">
        <div className="tis-track w-16"><div className="tis-bar" style={{width:Math.abs(v)+'%',background:v>0?'#22c55e':'#ef4444'}}/></div>
        <span className={`text-xs font-bold ${v>0?'gain':v<0?'loss':'neutral'}`}>{sign(v)}{v}</span>
      </div>
    ),sortVal:r=>r.tis},
    {key:'_spark',label:'7d',render:(v,r)=><Sparkline r={r}/>,sortVal:null},
  ];
  return(
    <div className="card rounded-xl p-5 fi">
      <div className="flex items-center justify-between mb-4">
        <h2 className="font-bold">📄 Pages Performance</h2>
        <button className="text-xs px-3 py-1.5 rounded-lg card" onClick={()=>dlCSV(rows,[
          {label:'Page',fn:r=>r.key},{label:'Group',fn:r=>r.group},{label:'Clicks',fn:r=>r.clicks},{label:'Prev Clicks',fn:r=>r.prevClicks},
          {label:'Click Diff',fn:r=>r.clicksDiff},{label:'Click %',fn:r=>r.clicksPct},{label:'Impressions',fn:r=>r.impressions},
          {label:'CTR',fn:r=>r.ctr},{label:'Position',fn:r=>r.position},{label:'Pos Diff',fn:r=>r.posDiff},{label:'TIS',fn:r=>r.tis}
        ],'pages-report')}>⬇ CSV</button>
      </div>
      <STable cols={cols} rows={rows} defaultSort="clicks" perPageOpts={[10,25,50,100,9999]} defaultPer={25} searchPlaceholder="Search pages..."/>
    </div>
  );
}

/* ─── TRAFFIC IMPACT SCORE PAGE ─── */
function TrafficScorePage({cp}){
  const rows=useMemo(()=>cp.map(r=>({...r,tis:calcTIS(r)})).sort((a,b)=>Math.abs(b.tis)-Math.abs(a.tis)),[cp]);
  const bigWins=rows.filter(r=>r.tis>30).length;
  const bigLoss=rows.filter(r=>r.tis<-30).length;
  return(
    <div className="space-y-4 fi">
      <div className="grid md:grid-cols-3 gap-4">
        <div className="card rounded-xl p-4 text-center">
          <div className="text-2xl font-bold gain">{bigWins}</div>
          <div className="text-xs mt-1" style={{color:'var(--sub)'}}>Pages with TIS &gt;+30</div>
        </div>
        <div className="card rounded-xl p-4 text-center">
          <div className="text-2xl font-bold loss">{bigLoss}</div>
          <div className="text-xs mt-1" style={{color:'var(--sub)'}}>Pages with TIS &lt;-30</div>
        </div>
        <div className="card rounded-xl p-4 text-center">
          <div className="text-2xl font-bold" style={{color:'var(--tx)'}}>{(rows.reduce((s,r)=>s+r.tis,0)/rows.length).toFixed(1)}</div>
          <div className="text-xs mt-1" style={{color:'var(--sub)'}}>Avg TIS score</div>
        </div>
      </div>
      <div className="card rounded-xl p-5">
        <div className="flex items-center justify-between mb-3">
          <h2 className="font-bold">📊 Traffic Impact Score (TIS)</h2>
          <span className="text-xs" style={{color:'var(--sub)'}}>TIS = Clicks Δ × 0.6 + Position Δ × 0.4</span>
        </div>
        <STable cols={[
          {key:'key',label:'Page',render:(v)=><span className="text-xs truncate block w-64" title={v}>{shortURL(v)}</span>},
          {key:'tis',label:'TIS',sortVal:r=>r.tis,render:(v,r)=>(
            <div className="flex items-center gap-2">
              <div className="tis-track w-20"><div className="tis-bar" style={{width:Math.abs(v)+'%',background:v>0?'#22c55e':'#ef4444'}}/></div>
              <span className={`text-xs font-bold ${v>0?'gain':v<0?'loss':'neutral'}`}>{sign(v)}{v}</span>
            </div>
          )},
          {key:'clicksDiff',label:'Clicks Δ',render:(v)=><Bdg v={v} fmtFn={n=>sign(n)+fmt(n)}/>},
          {key:'clicksPct',label:'Click %',render:v=><Bdg v={v} fmtFn={n=>sign(n)+n.toFixed(1)+'%'}/>},
          {key:'posDiff',label:'Pos Δ',render:v=><Bdg v={v} fmtFn={n=>sign(n)+n.toFixed(1)}/>},
          {key:'clicks',label:'Clicks',render:v=>fmt(v)},
          {key:'impressions',label:'Impr',render:v=>fmt(v)},
        ]} rows={rows} defaultSort="tis" defaultDir="desc" perPageOpts={[10,25,50,100,9999]} defaultPer={25}/>
      </div>
    </div>
  );
}

/* ─── ALERTS PAGE ─── */
function AlertsPage({cp}){
  const alerts=useMemo(()=>generateAlerts(cp),[cp]);
  const alertStyle={c:'alert-c',w:'alert-w',s:'alert-s',o:'alert-o'};
  const alertIcon={c:'🚨',w:'⚠️',s:'✅',o:'💡'};
  const alertLabel={c:'Critical',w:'Warning',s:'Opportunity',o:'CTR Gap'};
  if(!alerts.length) return <div className="card rounded-xl p-10 text-center fi" style={{color:'var(--sub)'}}>No significant alerts for this period.</div>;
  return(
    <div className="space-y-3 fi">
      <div className="flex items-center gap-3 mb-2">
        <span className="text-sm font-semibold">{alerts.length} alerts</span>
        {['c','w','o','s'].map(sev=>{
          const n=alerts.filter(a=>a.sev===sev).length;
          return n>0&&<span key={sev} className={`text-xs px-2 py-1 rounded-full ${sev==='c'?'bg-loss':sev==='w'?'text-amber-600 bg-amber-50 dark:bg-amber-900':sev==='s'?'bg-gain':'text-blue-600 bg-blue-50 dark:bg-blue-900'}`}>{alertIcon[sev]} {n} {alertLabel[sev]}</span>;
        })}
      </div>
      {alerts.map((a,i)=>(
        <div key={i} className={`rounded-xl p-4 ${alertStyle[a.sev]}`}>
          <div className="flex items-start gap-3">
            <span className="text-lg">{alertIcon[a.sev]}</span>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 mb-1">
                <span className="text-xs font-bold uppercase">{a.type}</span>
              </div>
              <div className="text-sm truncate mb-1" style={{color:'var(--sub)'}} title={a.page}>{shortURL(a.page)}</div>
              <div className="text-sm font-medium">{a.msg}</div>
              <div className="text-xs mt-1.5 px-2 py-1 rounded inline-block" style={{background:'rgba(0,0,0,.05)'}}> Action: {a.action}</div>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ─── DECAY PAGE ─── */
function DecayPage({cp}){
  const decaying=useMemo(()=>detectDecay(cp),[cp]);
  const sevColor={critical:'#ef4444',warning:'#f59e0b',low:'#94a3b8'};
  if(!decaying.length) return <div className="card rounded-xl p-10 text-center fi" style={{color:'var(--sub)'}}>No content decay detected in this period.</div>;
  return(
    <div className="card rounded-xl p-5 fi">
      <div className="flex items-center justify-between mb-4">
        <h2 className="font-bold">📉 Content Decay Detection ({decaying.length} pages)</h2>
        <button className="text-xs px-3 py-1.5 rounded-lg card" onClick={()=>dlCSV(decaying,[
          {label:'Page',fn:r=>r.key},{label:'Decay Type',fn:r=>r.decayType},{label:'Severity',fn:r=>r.severity},
          {label:'Clicks',fn:r=>r.clicks},{label:'Click %',fn:r=>r.clicksPct},{label:'CTR Diff',fn:r=>r.ctrDiff},{label:'Impr %',fn:r=>r.impPct}
        ],'decay-report')}>⬇ CSV</button>
      </div>
      <STable cols={[
        {key:'key',label:'Page',render:v=><span className="text-xs truncate block w-64" title={v}>{shortURL(v)}</span>},
        {key:'decayType',label:'Decay Type',render:v=><span className="text-xs font-semibold px-2 py-0.5 rounded bg-neut">{v}</span>},
        {key:'severity',label:'Severity',render:v=><span className="text-xs font-bold" style={{color:sevColor[v]}}>{v}</span>},
        {key:'clicksPct',label:'Clicks %',render:v=><Bdg v={v} fmtFn={n=>sign(n)+n.toFixed(1)+'%'}/>},
        {key:'ctrDiff',label:'CTR Δ',render:v=><Bdg v={v} fmtFn={n=>sign(n)+(n*100).toFixed(2)+'%'}/>},
        {key:'impPct',label:'Impr %',render:v=><Bdg v={v} fmtFn={n=>sign(n)+n.toFixed(1)+'%'}/>},
        {key:'clicks',label:'Clicks',render:v=>fmt(v)},
        {key:'impressions',label:'Impr',render:v=>fmt(v)},
      ]} rows={decaying} defaultSort="clicksPct" defaultDir="asc" perPageOpts={[10,25,50,9999]} defaultPer={25}/>
    </div>
  );
}
/* ─── URL GROUPS PAGE ─── */
function URLGroupsPage({cp}){
  const groups=useMemo(()=>{
    const map={};
    cp.forEach(r=>{
      const g=classifyURL(r.key);
      if(!map[g]) map[g]={group:g,pages:0,clicks:0,prevClicks:0,impressions:0,ctrSum:0,posSum:0,gainers:0,losers:0};
      const m=map[g];
      m.pages++;m.clicks+=r.clicks;m.prevClicks+=(r.prevClicks||0);
      m.impressions+=r.impressions;m.ctrSum+=r.ctr*r.impressions;m.posSum+=r.position*r.impressions;
      if((r.clicksDiff||0)>0) m.gainers++;else if((r.clicksDiff||0)<0) m.losers++;
    });
    return Object.values(map).map(m=>({
      ...m,clicksDiff:m.clicks-m.prevClicks,clicksPct:pctC(m.clicks,m.prevClicks),
      ctr:m.ctrSum/Math.max(1,m.impressions),pos:m.posSum/Math.max(1,m.impressions)
    })).sort((a,b)=>b.clicks-a.clicks);
  },[cp]);
  const total=groups.reduce((s,g)=>s+g.clicks,0);
  return(
    <div className="space-y-4 fi">
      <div className="grid md:grid-cols-2 xl:grid-cols-3 gap-4">
        {groups.map((g,i)=>(
          <div key={i} className="card rounded-xl p-5" style={{borderTop:`3px solid ${CAT_COLOR[g.group]||'#94a3b8'}`}}>
            <div className="flex items-start justify-between mb-3">
              <div>
                <div className="flex items-center gap-2">
                  <span style={{width:10,height:10,borderRadius:'50%',background:CAT_COLOR[g.group]||'#94a3b8',display:'inline-block'}}></span>
                  <div className="font-semibold text-sm">{g.group}</div>
                </div>
                <div className="text-xs mt-0.5" style={{color:'var(--sub)'}}>{g.pages} pages</div>
              </div>
              <div className="text-xs font-semibold px-2 py-0.5 rounded-full" style={{background:CAT_COLOR[g.group]||'#94a3b8',color:'#fff'}}>{((g.clicks/total)*100).toFixed(1)}%</div>
            </div>
            <div className="text-xl font-bold mb-1">{fmt(g.clicks)}<span className="text-sm font-normal ml-1" style={{color:'var(--sub)'}}>clicks</span></div>
            <div className="flex items-center gap-2 text-sm">
              <Bdg v={g.clicksDiff} fmtFn={n=>sign(n)+fmt(n)}/>
              {g.clicksPct!=null&&<Bdg v={g.clicksPct} fmtFn={n=>sign(n)+n.toFixed(1)+'%'}/>}
            </div>
            <div className="flex gap-4 mt-2 text-xs" style={{color:'var(--sub)'}}>
              <span>{fmt(g.impressions)} impr</span>
              <span>CTR {fmtP(g.ctr)}</span>
              <span>Pos {fmtN(g.pos)}</span>
            </div>
            <div className="flex gap-3 mt-2 text-xs">
              <span className="gain">↑ {g.gainers} gaining</span>
              <span className="loss">↓ {g.losers} losing</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── AI ANALYSIS PAGE ─── */
function AIAnalysisPage({cp,ck}){
  const [sel,setSel]=useState('losing');
  const focusPages=useMemo(()=>{
    if(sel==='losing') return [...cp].sort((a,b)=>(a.clicksPct||0)-(b.clicksPct||0)).slice(0,15);
    if(sel==='opportunity') return cp.filter(p=>p.impressions>10000&&p.ctr<0.025).sort((a,b)=>b.impressions-a.impressions).slice(0,15);
    return [...cp].sort((a,b)=>(b.clicksPct||0)-(a.clicksPct||0)).slice(0,15);
  },[cp,sel]);
  const icnMap={critical:'🚨',warning:'⚠️',success:'✅',opportunity:'💡',info:'ℹ️'};
  const clsMap={critical:'alert-c',warning:'alert-w',success:'alert-s',opportunity:'alert-o',info:''};
  return(
    <div className="space-y-4 fi">
      <div className="flex items-center gap-2 mb-2">
        <span className="text-sm font-semibold">Analyse:</span>
        {[['losing','📉 Top Losers'],['opportunity','💡 CTR Opps'],['gaining','🚀 Top Gainers']].map(([k,l])=>(
          <button key={k} className={`text-xs px-3 py-1.5 rounded-full src-btn ${sel===k?'src-on':'src-off'}`} onClick={()=>setSel(k)}>{l}</button>
        ))}
      </div>
      {focusPages.map((p,i)=>{
        const causes=aiRootCause(p);

            <div className="flex items-start justify-between mb-2">
              <div>
                <a href={p.key} target="_blank" className="text-sm text-blue-500 hover:underline">{shortURL(p.key)}</a>
                <div className="flex gap-3 text-xs mt-1" style={{color:'var(--sub)'}}>
                  <span>{fmt(p.clicks)} clicks</span>
                  <Bdg v={p.clicksPct} fmtFn={n=>sign(n)+n.toFixed(1)+'%'}/>
                  <span>Pos {fmtN(p.position)}</span>

            <div className="space-y-1.5 mt-2">

        );
      })}

/* ─── GSC OAUTH SOURCE ─── */
function GscOAuthPage({onLoad}){
  const [step,setStep]=useState('connecting'); // setup | connecting | sites | loading | done
  const [clientId,setClientId]=useState('464969597167-iplinfr9l74uat3sjp21oam0vb73okoj.apps.googleusercontent.com');
  const [token,setToken]=useState('');
  const [sites,setSites]=useState([]);
  const [site,setSite]=useState('');
  const [status,setStatus]=useState('');
  const [dates,setDates]=useState({s:'2026-05-28',e:'2026-06-25',ps:'2026-04-30',pe:'2026-05-27'});
  const [rowLimit,setRowLimit]=useState(500);
  const [siteSearch,setSiteSearch]=useState('');
  const tokenRef=useRef(null);
  useEffect(()=>{ const t=setTimeout(()=>connect(),800); return ()=>clearTimeout(t); },[]);

  const connect=()=>{
    if(!clientId.trim()){setStatus('Please enter your Google OAuth Client ID.');return;}
    if(!window.google?.accounts?.oauth2){setStatus('Google Identity Services not loaded. Check internet connection and refresh.');return;}
    setStatus('Opening Google auth popup...');
    setStep('connecting');
    tokenRef.current=window.google.accounts.oauth2.initTokenClient({
      client_id:clientId.trim(),
      scope:'https://www.googleapis.com/auth/webmasters.readonly',
      callback:async(resp)=>{
        if(resp.error){setStatus('Auth error: '+resp.error);setStep('setup');return;}
        setToken(resp.access_token);
        setStatus('Fetching your GSC properties...');
        setStep('sites');
        try{
          const r=await fetch('https://www.googleapis.com/webmasters/v3/sites',{headers:{Authorization:'Bearer '+resp.access_token}});
          const d=await r.json();
          const list=(d.siteEntry||[]).map(s=>s.siteUrl);
          setSites(list);
          const bb=list.find(s=>s.includes('bankbazaar'))||list[0]||'';
          setSite(bb);
          setStatus('✅ Connected — '+list.length+' properties found');
        }catch(e){setStatus('Error fetching sites: '+e.message);}
      }
    });
    tokenRef.current.requestAccessToken();
  };

  const fetchGSC=async(siteUrl,start,end,dim,limit)=>{
    const r=await fetch(
      'https://www.googleapis.com/webmasters/v3/sites/'+encodeURIComponent(siteUrl)+'/searchAnalytics/query',
      {method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
       body:JSON.stringify({startDate:start,endDate:end,dimensions:[dim==='pages'?'page':'query'],rowLimit:limit,dataState:'final'})}
    );
    const d=await r.json();
    if(d.error) throw new Error(d.error.message);
    return(d.rows||[]).map(row=>({key:row.keys[0],clicks:row.clicks,impressions:row.impressions,ctr:row.ctr,position:row.position}));
  };

  const loadData=async()=>{
    if(!site||!token){setStatus('Select a site first.');return;}
    setStep('loading');setStatus('Fetching pages (current period)...');
    try{
      const [pC,pP,qC,qP]=await Promise.all([
        fetchGSC(site,dates.s,dates.e,'pages',rowLimit),
        fetchGSC(site,dates.ps,dates.pe,'pages',rowLimit),
        fetchGSC(site,dates.s,dates.e,'queries',rowLimit),
        fetchGSC(site,dates.ps,dates.pe,'queries',rowLimit),
      ]);
      setStatus('✅ Loaded '+pC.length+' pages, '+qC.length+' keywords');
      setStep('done');
      onLoad({cp:computeComp(pC,pP),ck:computeComp(qC,qP),label:site+' · '+dates.s+' vs '+dates.ps,_meta:{token,site,sites,dates}});
    }catch(e){setStatus('❌ Error: '+e.message);setStep('sites');}
  };

  const labelStyle={fontSize:11,fontWeight:600,color:'var(--sub)',textTransform:'uppercase',letterSpacing:'0.05em',display:'block',marginBottom:4};

  if(step==='setup'||step==='connecting') return(
    <div className="max-w-lg mx-auto space-y-4 fi">
      <div className="card rounded-xl p-6">
        <div className="flex flex-col items-center mb-5">
          <div className="lottie-float">
            <lottie-player src="https://assets4.lottiefiles.com/packages/lf20_jbrw3hcz.json" background="transparent" speed="1" style={{width:'120px',height:'120px'}} loop autoplay></lottie-player>
          </div>
          <h2 className="font-bold text-base mb-1 text-center">🔑 Connect Google Search Console</h2>
          <p className="text-sm text-center" style={{color:'var(--sub)'}}>Connect directly to your GSC account for live data — no CSV export needed.</p>
        </div>
        <div className="space-y-4">
          <div className="rounded-xl p-4" style={{background:'rgba(59,130,246,.06)',border:'1px solid rgba(59,130,246,.2)'}}>
            <div className="text-xs font-bold mb-2" style={{color:'#3b82f6'}}>⚙️ One-time setup (2 minutes)</div>
            <ol className="text-xs space-y-1" style={{color:'var(--sub)'}}>
              <li>1. Go to <a href="https://console.cloud.google.com/" target="_blank" className="text-blue-500">console.cloud.google.com</a> → Create/select project</li>
              <li>2. Enable <strong>Google Search Console API</strong></li>
              <li>3. APIs &amp; Services → Credentials → Create OAuth 2.0 Client ID (Web application)</li>
              <li>4. Add <code style={{background:'rgba(0,0,0,.1)',padding:'1px 4px',borderRadius:3}}>http://localhost:8765</code> to Authorized JavaScript origins</li>
              <li>5. Copy the Client ID and paste below</li>
            </ol>
          </div>
          <div>
            <label style={labelStyle}>Google OAuth Client ID</label>
            <input className="w-full rounded-lg px-3 py-2 text-sm" placeholder="xxxx.apps.googleusercontent.com"
              value={clientId} onChange={e=>setClientId(e.target.value)}/>
          </div>

                    padding:'10px 14px',cursor:'pointer',

              <input type="date" className="w-full rounded-lg px-3 py-2 text-sm" value={dates.s} onChange={e=>setDates(d=>({...d,s:e.target.value}))}/>

              <input type="date" className="w-full rounded-lg px-3 py-2 text-sm" value={dates.ps} onChange={e=>setDates(d=>({...d,ps:e.target.value}))}/>

            <div>

}

/* ─── AHREFS IMPORT PAGE ─── */
function ImportPage({onLoad}){
  const [files,setFiles]=useState({curr:null,prev:null,kwC:null,kwP:null});
  const [status,setStatus]=useState('');
  const dropRef=useRef({});
  const readFile=(key,file)=>{
    const r=new FileReader();r.onload=e=>setFiles(f=>({...f,[key]:{name:file.name,text:e.target.result}}));r.readAsText(file);
  };
  const apply=()=>{
    if(!files.curr||!files.prev){setStatus('Upload at least current and previous pages CSVs.');return;}
    const pC=parseGSCcsv(files.curr.text),pP=parseGSCcsv(files.prev.text);
    if(!pC){setStatus('Could not parse current pages CSV.');return;}
    const qC=files.kwC?parseGSCcsv(files.kwC.text):[];
    const qP=files.kwP?parseGSCcsv(files.kwP.text):[];
    onLoad({cp:computeComp(pC,pP),ck:computeComp(qC||[],qP||[]),label:'CSV Import · Custom dates'});
    setStatus('✅ Loaded '+pC.length+' pages'+(qC?' + '+qC.length+' keywords':''));
  };
  const DZ=({label,fkey})=>{
    const f=files[fkey];
    return(
      <div className="dz rounded-xl p-5 text-center cursor-pointer" onClick={()=>{const i=document.createElement('input');i.type='file';i.accept='.csv';i.onchange=e=>readFile(fkey,e.target.files[0]);i.click();}}>
        <div className="text-2xl mb-1">{f?'✅':'📁'}</div>
        <div className="text-sm font-medium">{f?f.name:label}</div>
        <div className="text-xs mt-1" style={{color:'var(--sub)'}}>{f?'Click to replace':'Drop CSV or click'}</div>
      </div>
    );
  };
  return(
    <div className="max-w-lg mx-auto fi">
      <div className="card rounded-xl p-6 space-y-4">
        <h2 className="font-bold">📂 Import CSV from GSC</h2>
        <p className="text-sm" style={{color:'var(--sub)'}}>Export from Google Search Console → Performance → Export → Download CSV</p>
        <div className="grid grid-cols-2 gap-3">
          <DZ label="Current Pages CSV" fkey="curr"/>
          <DZ label="Previous Pages CSV" fkey="prev"/>
          <DZ label="Current Keywords CSV (opt)" fkey="kwC"/>
          <DZ label="Previous Keywords CSV (opt)" fkey="kwP"/>
        </div>
        <button className="w-full py-2.5 rounded-xl text-sm font-semibold" style={{background:'#3b82f6',color:'#fff'}} onClick={apply}>Apply Data</button>
        {status&&<div className="text-sm text-center" style={{color:'var(--sub)'}}>{status}</div>}
      </div>
    </div>
  );
}

/* ─── HISTORY PAGE (monthly GSC performance from gsc-data.js) ─── */
function HistoryPage(){
  const hist=(_D.history||[]);
  if(!hist.length) return <div className="text-center py-20" style={{color:'var(--sub)'}}>No history data available. Refresh gsc-data.js to accumulate snapshots.</div>;
  const fmtM=d=>{ const [y,m]=d.split('-'); const names=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return names[+m]+' '+y; };
  const latest=hist[hist.length-1];
  const prev=hist[hist.length-2]||latest;
  const pctC=(a,b)=>b?((a-b)/b*100).toFixed(1):null;
  return(
    <div className="space-y-6">
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        {[
          {lbl:'Total Clicks',val:fmt(latest.clicks),chg:pctC(latest.clicks,prev.clicks)},
          {lbl:'Impressions',val:fmt(latest.impressions),chg:pctC(latest.impressions,prev.impressions)},
          {lbl:'Avg CTR',val:latest.ctr.toFixed(2)+'%',chg:pctC(latest.ctr,prev.ctr)},
          {lbl:'Avg Position',val:latest.position.toFixed(1),chg:pctC(prev.position,latest.position)},
        ].map((m,i)=>(
          <div key={i} className="card rounded-xl p-4">
            <div className="text-xs mb-1" style={{color:'var(--sub)'}}>{m.lbl} <span style={{color:'var(--sub)',fontWeight:400}}>({fmtM(latest.date)})</span></div>
            <div className="text-2xl font-bold">{m.val}</div>
            {m.chg!=null&&<div className={parseFloat(m.chg)>=0?'gain text-xs':'loss text-xs'}>{parseFloat(m.chg)>=0?'▲':'▼'} {Math.abs(m.chg)}% vs prev month</div>}
          </div>
        ))}
      </div>
      <div className="card rounded-xl p-4">
        <SVGChart data={hist.map(h=>({date:fmtM(h.date),v:h.clicks}))} title="Monthly Clicks" series={[{key:'v',color:'#3b82f6'}]} height={200}/>
      </div>
      <div className="card rounded-xl p-4">
        <SVGChart data={hist.map(h=>({date:fmtM(h.date),v:h.impressions}))} title="Monthly Impressions" series={[{key:'v',color:'#8b5cf6'}]} height={200}/>
      </div>
      <div className="card rounded-xl overflow-hidden">
        <table className="w-full text-sm">
          <thead><tr style={{background:'var(--bdr)'}}>
            {['Month','Clicks','Impressions','CTR %','Avg Position'].map(h=><th key={h} className="px-4 py-2 text-left font-semibold text-xs" style={{color:'var(--sub)'}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {[...hist].reverse().map((h,i)=>(
              <tr key={i} className="border-t" style={{borderColor:'var(--bdr)'}}>
                <td className="px-4 py-2 font-medium">{fmtM(h.date)}</td>
                <td className="px-4 py-2">{fmt(h.clicks)}</td>
                <td className="px-4 py-2">{fmt(h.impressions)}</td>
                <td className="px-4 py-2">{h.ctr.toFixed(2)}%</td>
                <td className="px-4 py-2">{h.position.toFixed(1)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ─── GA4 ANALYTICS PAGE ─── */
function GA4Page(){
  const [step,setStep]=useState('idle'); // idle|connecting|properties|loading|done|error
  const [token,setToken]=useState('');
  const [properties,setProperties]=useState([]);
  const [propId,setPropId]=useState('');
  const [propName,setPropName]=useState('');
  const [status,setStatus]=useState('');
  const [data,setData]=useState(null);
  const [dateRange,setDateRange]=useState('30daysAgo');
  const tokenRef=useRef(null);

  const DATE_OPTS=[
    {id:'7daysAgo',label:'Last 7 days'},
    {id:'30daysAgo',label:'Last 30 days'},
    {id:'90daysAgo',label:'Last 90 days'},
    {id:'180daysAgo',label:'Last 6 months'},
  ];

  const connect=()=>{
    if(!window.google?.accounts?.oauth2){setStatus('Google Identity Services not loaded.');return;}
    setStep('connecting');setStatus('Opening Google sign-in...');
    tokenRef.current=window.google.accounts.oauth2.initTokenClient({
      client_id:'464969597167-iplinfr9l74uat3sjp21oam0vb73okoj.apps.googleusercontent.com',
      scope:'https://www.googleapis.com/auth/analytics.readonly',
      callback:async(resp)=>{
        if(resp.error){setStatus('Auth error: '+resp.error);setStep('idle');return;}
        setToken(resp.access_token);
        setStep('properties');setStatus('Fetching GA4 properties...');
        try{
          const r=await fetch('https://analyticsadmin.googleapis.com/v1beta/accountSummaries',{headers:{Authorization:'Bearer '+resp.access_token}});
          const d=await r.json();
          const props=[];
          (d.accountSummaries||[]).forEach(acc=>{
            (acc.propertySummaries||[]).forEach(p=>{
              props.push({id:p.property.replace('properties/',''),name:p.displayName,account:acc.displayName});
            });
          });
          setProperties(props);
          if(props.length>0){setPropId(props[0].id);setPropName(props[0].name);}
          setStatus('✅ '+props.length+' properties found');
        }catch(e){setStatus('Error: '+e.message);setStep('idle');}
      }
    });
    tokenRef.current.requestAccessToken();
  };

  const fetchData=async()=>{
    if(!propId||!token)return;
    setStep('loading');setStatus('Fetching analytics data...');
    const base='https://analyticsdata.googleapis.com/v1beta/properties/'+propId;
    const hdr={Authorization:'Bearer '+token,'Content-Type':'application/json'};
    const endDate='yesterday';
    const startDate=dateRange;
    try{
      const [overviewR,channelsR,pagesR,devicesR,countriesR,trendR]=await Promise.all([
        // Overview metrics
        fetch(base+':runReport',{method:'POST',headers:hdr,body:JSON.stringify({
          dateRanges:[{startDate,endDate}],
          metrics:[{name:'sessions'},{name:'totalUsers'},{name:'newUsers'},{name:'screenPageViews'},{name:'bounceRate'},{name:'averageSessionDuration'},{name:'engagementRate'}]
        })}),
        // Traffic channels
        fetch(base+':runReport',{method:'POST',headers:hdr,body:JSON.stringify({
          dateRanges:[{startDate,endDate}],
          dimensions:[{name:'sessionDefaultChannelGroup'}],
          metrics:[{name:'sessions'},{name:'totalUsers'},{name:'bounceRate'}],
          orderBys:[{metric:{metricName:'sessions'},desc:true}],limit:10
        })}),
        // Top pages
        fetch(base+':runReport',{method:'POST',headers:hdr,body:JSON.stringify({
          dateRanges:[{startDate,endDate}],
          dimensions:[{name:'pagePath'}],
          metrics:[{name:'screenPageViews'},{name:'totalUsers'},{name:'averageSessionDuration'},{name:'bounceRate'}],
          orderBys:[{metric:{metricName:'screenPageViews'},desc:true}],limit:20
        })}),
        // Device breakdown
        fetch(base+':runReport',{method:'POST',headers:hdr,body:JSON.stringify({
          dateRanges:[{startDate,endDate}],
          dimensions:[{name:'deviceCategory'}],
          metrics:[{name:'sessions'},{name:'totalUsers'}]
        })}),
        // Country breakdown
        fetch(base+':runReport',{method:'POST',headers:hdr,body:JSON.stringify({
          dateRanges:[{startDate,endDate}],
          dimensions:[{name:'country'}],
          metrics:[{name:'sessions'},{name:'totalUsers'}],
          orderBys:[{metric:{metricName:'sessions'},desc:true}],limit:10
        })}),
        // 30-day trend
        fetch(base+':runReport',{method:'POST',headers:hdr,body:JSON.stringify({
          dateRanges:[{startDate,endDate}],
          dimensions:[{name:'date'}],
          metrics:[{name:'sessions'},{name:'totalUsers'}],
          orderBys:[{dimension:{dimensionName:'date'}}],limit:180
        })})
      ]);
      const [ov,ch,pg,dv,co,tr]=await Promise.all([overviewR,channelsR,pagesR,devicesR,countriesR,trendR].map(r=>r.json()));
      const metVal=(report,idx)=>parseFloat(report?.rows?.[0]?.metricValues?.[idx]?.value||0);
      const overview={
        sessions:metVal(ov,0),users:metVal(ov,1),newUsers:metVal(ov,2),
        pageviews:metVal(ov,3),bounceRate:(metVal(ov,4)*100).toFixed(1),
        avgDuration:metVal(ov,5),engagementRate:(metVal(ov,6)*100).toFixed(1)
      };
      const channels=(ch.rows||[]).map(r=>({
        channel:r.dimensionValues[0].value,sessions:+r.metricValues[0].value,
        users:+r.metricValues[1].value,bounce:(+r.metricValues[2].value*100).toFixed(1)
      }));
      const pages=(pg.rows||[]).map(r=>({
        path:r.dimensionValues[0].value,views:+r.metricValues[0].value,
        users:+r.metricValues[1].value,duration:(+r.metricValues[2].value).toFixed(0),
        bounce:(+r.metricValues[3].value*100).toFixed(1)
      }));
      const devices=(dv.rows||[]).map(r=>({device:r.dimensionValues[0].value,sessions:+r.metricValues[0].value,users:+r.metricValues[1].value}));
      const countries=(co.rows||[]).map(r=>({country:r.dimensionValues[0].value,sessions:+r.metricValues[0].value,users:+r.metricValues[1].value}));
      const trend=(tr.rows||[]).map(r=>({date:r.dimensionValues[0].value,sessions:+r.metricValues[0].value,users:+r.metricValues[1].value}));
      setData({overview,channels,pages,devices,countries,trend,propName,dateRange});
      setStep('done');setStatus('✅ Loaded');
    }catch(e){setStatus('Error: '+e.message);setStep('properties');}
  };

  const fmtSec=s=>{const m=Math.floor(s/60);const sec=Math.round(s%60);return m+'m '+sec+'s';};
  const CHANNEL_COLORS={'Organic Search':'#22c55e','Direct':'#3b82f6','Referral':'#8b5cf6','Organic Social':'#f59e0b','Email':'#06b6d4','Paid Search':'#ef4444','(Other)':'#94a3b8','Unassigned':'#94a3b8'};
  const chColor=ch=>CHANNEL_COLORS[ch]||'#94a3b8';

  if(step==='idle'||step==='connecting'){return(
    <div className="card rounded-xl p-8 max-w-md mx-auto text-center fi" style={{marginTop:40}}>
      <div style={{fontSize:48,marginBottom:12}}>📊</div>
      <h2 style={{fontSize:18,fontWeight:700,marginBottom:8}}>Connect Google Analytics 4</h2>
      <p style={{fontSize:13,color:'var(--sub)',marginBottom:24}}>See sessions, users, bounce rate, traffic sources and top pages from your GA4 property.</p>
      {status&&<div style={{fontSize:12,color:'var(--sub)',marginBottom:16}}>{status}</div>}
      <button onClick={connect} disabled={step==='connecting'} style={{width:'100%',padding:'11px',borderRadius:8,background:'linear-gradient(135deg,#4285f4,#34a853)',color:'#fff',border:'none',cursor:'pointer',fontWeight:700,fontSize:14}}>
        {step==='connecting'?'⟳ Connecting...':'🔑 Connect with Google'}
      </button>
    </div>
  );}

  if(step==='properties'){return(
    <div className="card rounded-xl p-6 max-w-lg mx-auto fi" style={{marginTop:40}}>
      <h2 style={{fontSize:16,fontWeight:700,marginBottom:4}}>Select GA4 Property</h2>
      <p style={{fontSize:12,color:'var(--sub)',marginBottom:16}}>{status}</p>
      <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16,maxHeight:300,overflowY:'auto'}}>
        {properties.map(p=>(
          <button key={p.id} onClick={()=>{setPropId(p.id);setPropName(p.name);}} style={{padding:'10px 14px',borderRadius:8,border:'2px solid',borderColor:propId===p.id?'#4285f4':'var(--bdr)',background:propId===p.id?'rgba(66,133,244,.08)':'transparent',textAlign:'left',cursor:'pointer',transition:'all .15s'}}>
            <div style={{fontWeight:600,fontSize:13}}>{p.name}</div>
            <div style={{fontSize:11,color:'var(--sub)'}}>{p.account} · ID: {p.id}</div>
          </button>
        ))}
      </div>
      <div style={{marginBottom:16}}>
        <label style={{fontSize:11,fontWeight:600,color:'var(--sub)',display:'block',marginBottom:6}}>DATE RANGE</label>
        <select value={dateRange} onChange={e=>setDateRange(e.target.value)} style={{width:'100%',padding:'8px',borderRadius:6,border:'1px solid var(--bdr)',background:'var(--card)',color:'var(--tx)',fontSize:13}}>
          {DATE_OPTS.map(o=><option key={o.id} value={o.id}>{o.label}</option>)}
        </select>
      </div>
      <button onClick={fetchData} disabled={!propId} style={{width:'100%',padding:'10px',borderRadius:8,background:'#4285f4',color:'#fff',border:'none',cursor:'pointer',fontWeight:700,fontSize:14}}>
        Load Analytics Data →
      </button>
    </div>
  );}

  if(step==='loading'){return(
    <div className="text-center py-20" style={{color:'var(--sub)'}}>
      <div style={{fontSize:32,marginBottom:12}}>⟳</div>
      <div>Loading GA4 data for {propName}...</div>
    </div>
  );}

  if(!data)return null;
  const {overview,channels,pages,devices,countries,trend}=data;
  const maxCh=Math.max(...channels.map(c=>c.sessions),1);
  const maxTrend=Math.max(...trend.map(t=>t.sessions),1);
  const tW=560,tH=80;

  return(
    <div className="space-y-6 fi">
      {/* Header + controls */}
      <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
        <div>
          <h2 style={{fontSize:16,fontWeight:700,margin:0}}>{propName}</h2>
          <span style={{fontSize:12,color:'var(--sub)'}}>GA4 Analytics · {DATE_OPTS.find(o=>o.id===dateRange)?.label}</span>
        </div>
        <div style={{marginLeft:'auto',display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <select value={dateRange} onChange={e=>setDateRange(e.target.value)} style={{padding:'6px 10px',borderRadius:6,border:'1px solid var(--bdr)',background:'var(--card)',color:'var(--tx)',fontSize:12}}>
            {DATE_OPTS.map(o=><option key={o.id} value={o.id}>{o.label}</option>)}
          </select>
          <button onClick={fetchData} style={{padding:'6px 14px',borderRadius:6,background:'#4285f4',color:'#fff',border:'none',cursor:'pointer',fontWeight:600,fontSize:12}}>Refresh</button>
          <button onClick={()=>{setStep('idle');setData(null);setToken('');}} style={{padding:'6px 12px',borderRadius:6,border:'1px solid var(--bdr)',background:'transparent',color:'var(--sub)',cursor:'pointer',fontSize:12}}>Disconnect</button>
        </div>
      </div>

      {/* Metric cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:12}}>
        {[
          {label:'Sessions',value:fmt(overview.sessions),icon:'🔄',color:'#3b82f6'},
          {label:'Users',value:fmt(overview.users),icon:'👥',color:'#22c55e'},
          {label:'New Users',value:fmt(overview.newUsers),icon:'✨',color:'#8b5cf6'},
          {label:'Pageviews',value:fmt(overview.pageviews),icon:'📄',color:'#f59e0b'},
          {label:'Bounce Rate',value:overview.bounceRate+'%',icon:'↩️',color:'#ef4444'},
          {label:'Avg Duration',value:fmtSec(overview.avgDuration),icon:'⏱',color:'#06b6d4'},
          {label:'Engagement',value:overview.engagementRate+'%',icon:'💡',color:'#10b981'},
        ].map(m=>(
          <div key={m.label} className="card rounded-xl p-4">
            <div style={{fontSize:20,marginBottom:4}}>{m.icon}</div>
            <div style={{fontSize:22,fontWeight:800,color:m.color}}>{m.value}</div>
            <div style={{fontSize:11,color:'var(--sub)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.04em'}}>{m.label}</div>

                <div style={{height:5,background:'var(--bdr)',borderRadius:3}}>

                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Device + Country */}

                    <div style={{fontSize:22}}>{icon}</div>

          <div className="card rounded-xl p-5">
            <div style={{fontWeight:700,fontSize:14,marginBottom:10}}>Top Countries</div>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>

                <div key={c.country} style={{display:'flex',alignItems:'center',gap:8,fontSize:12}}>

      {/* Top pages */}

               <div className="tbl-wrap">

/* ─── CTR GAPS PAGE ─── */
function CTRGapsPage({cp}){
  const [minImp,setMinImp]=useState(500);
  const [maxCtr,setMaxCtr]=useState(5);
  const [maxPos,setMaxPos]=useState(20);
  const [sortKey,setSortKey]=useState('oppClicks');
  const [sortDir,setSortDir]=useState(-1);
  const [priFilter,setPriFilter]=useState('all');

  const expCtr=(pos)=>{
    if(pos<=1)return 28;if(pos<=2)return 15;if(pos<=3)return 11;
    if(pos<=4)return 8;if(pos<=5)return 7;if(pos<=6)return 5.5;
    if(pos<=7)return 4.5;if(pos<=8)return 3.8;if(pos<=9)return 3.2;
    if(pos<=10)return 2.8;if(pos<=15)return 1.5;if(pos<=20)return 0.9;
    return 0.5;
  };

  const getPri=(gap)=>gap>=15?{lbl:'Critical',color:'#ef4444',bg:'rgba(239,68,68,.13)'}
    :gap>=8?{lbl:'High',color:'#f97316',bg:'rgba(249,115,22,.13)'}
    :gap>=4?{lbl:'Medium',color:'#f59e0b',bg:'rgba(245,158,11,.13)'}
    :{lbl:'Low',color:'#94a3b8',bg:'rgba(148,163,184,.1)'};

  const rows=useMemo(()=>{
    if(!cp)return[];
    return cp
      .filter(r=>{
        const ctrPct=r.ctr*100;
        const exp=expCtr(r.position);
        return r.impressions>=minImp&&ctrPct<=maxCtr&&r.position<=maxPos&&(exp-ctrPct)>0;
      })
      .map(r=>{
        const ctrPct=+(r.ctr*100).toFixed(2);
        const exp=expCtr(r.position);
        const gap=+(exp-ctrPct).toFixed(2);
        const oppClicks=Math.round(r.impressions*(gap/100));
        const pri=getPri(gap);
        return{...r,ctrPct,exp,gap,oppClicks,pri};
      })
      .filter(r=>priFilter==='all'||r.pri.lbl.toLowerCase()===priFilter)
      .sort((a,b)=>{
        const av=a[sortKey],bv=b[sortKey];
        if(av==null)return 1;if(bv==null)return-1;
        return sortDir*(av>bv?1:av<bv?-1:0);
      });
  },[cp,minImp,maxCtr,maxPos,sortKey,sortDir,priFilter]);

  const toggleSort=(k)=>{if(sortKey===k)setSortDir(d=>-d);else{setSortKey(k);setSortDir(-1);}};
  const sortIcon=(k)=>(<span style={{fontSize:9,opacity:sortKey===k?1:.35,marginLeft:3}}>{sortKey===k?(sortDir===-1?'▼':'▲'):'⇅'}</span>);

  const totalOppClicks=rows.reduce((s,r)=>s+r.oppClicks,0);
  const totalImpr=rows.reduce((s,r)=>s+r.impressions,0);
  const avgGap=rows.length?(rows.reduce((s,r)=>s+r.gap,0)/rows.length).toFixed(1):'0';
  const priCounts={critical:0,high:0,medium:0,low:0};
  rows.forEach(r=>{const k=r.pri.lbl.toLowerCase();if(k in priCounts)priCounts[k]++;});

  const IMP_OPTS=[{v:100,l:'100'},{v:500,l:'500'},{v:1000,l:'1K'},{v:5000,l:'5K'},{v:10000,l:'10K'}];
  const CTR_OPTS=[{v:1,l:'≤1%'},{v:2,l:'≤2%'},{v:3,l:'≤3%'},{v:5,l:'≤5%'},{v:10,l:'≤10%'}];
  const POS_OPTS=[{v:10,l:'Top 10'},{v:20,l:'Top 20'},{v:30,l:'Top 30'},{v:50,l:'All'}];

  const BtnGroup=({opts,val,onChange})=>(
    <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
      {opts.map(o=>{
        const on=val===o.v;
        return(<button key={o.v} onClick={()=>onChange(o.v)} style={{padding:'4px 11px',borderRadius:20,border:'1px solid '+(on?'#3b82f6':'var(--bdr)'),background:on?'#3b82f6':'transparent',color:on?'#fff':'var(--sub)',fontSize:11,fontWeight:on?700:500,cursor:'pointer',transition:'all .15s'}}>{o.l}</button>);
      })}
    </div>
  );

  return(
    <div style={{display:'flex',flexDirection:'column',gap:20}}>

      {/* Title + priority quick-filter */}
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:16,flexWrap:'wrap'}}>
        <div>
          <h2 style={{fontSize:20,fontWeight:800,color:'var(--tx)',margin:0,lineHeight:1.2}}>👁 CTR Gap Analysis</h2>
          <p style={{fontSize:13,color:'var(--sub)',margin:'5px 0 0'}}>Pages that rank and get impressions but users don't click — fix titles &amp; meta descriptions</p>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {[
            {k:'all',l:'All',c:'#3b82f6'},
            {k:'critical',l:`🔴 Critical${priCounts.critical>0?' ('+priCounts.critical+')':''}`,c:'#ef4444'},
            {k:'high',l:`🟠 High${priCounts.high>0?' ('+priCounts.high+')':''}`,c:'#f97316'},
            {k:'medium',l:`🟡 Medium${priCounts.medium>0?' ('+priCounts.medium+')':''}`,c:'#f59e0b'},
          ].map(p=>{
            const on=priFilter===p.k;
            return(<button key={p.k} onClick={()=>setPriFilter(p.k)} style={{padding:'5px 13px',borderRadius:20,border:'1px solid '+(on?p.c:'var(--bdr)'),background:on?p.c:'transparent',color:on?'#fff':p.c,fontSize:11,fontWeight:700,cursor:'pointer',transition:'all .15s'}}>{p.l}</button>);
          })}
        </div>
      </div>

      {/* KPI cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:12}}>
        {[
          {lbl:'Gap Pages',val:fmt(rows.length),color:'#3b82f6',icon:'📄',sub:'matching filters'},
          {lbl:'Opp. Clicks',val:'+'+fmt(totalOppClicks),color:'#22c55e',icon:'🎯',sub:'if CTR = benchmark'},
          {lbl:'Total Impressions',val:fmt(totalImpr),color:'#8b5cf6',icon:'👁',sub:'visible in search'},
          {lbl:'Avg CTR Gap',val:avgGap+'%',color:'#f97316',icon:'📉',sub:'below benchmark'},
        ].map(k=>(
          <div key={k.lbl} className="card rounded-xl" style={{padding:'14px 16px',borderLeft:'3px solid '+k.color}}>
            <div style={{fontSize:10,fontWeight:700,color:'var(--sub)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:6}}>{k.icon} {k.lbl}</div>
            <div style={{fontSize:22,fontWeight:800,color:k.color,lineHeight:1.1}}>{k.val}</div>
            <div style={{fontSize:11,color:'var(--sub)',marginTop:4}}>{k.sub}</div>
          </div>
        ))}
      </div>

      {/* Filters */}
      <div className="card rounded-xl" style={{padding:'14px 18px',display:'flex',gap:20,flexWrap:'wrap',alignItems:'flex-start'}}>
        <div style={{display:'flex',flexDirection:'column',gap:7}}>
          <span style={{fontSize:10,fontWeight:700,color:'var(--sub)',textTransform:'uppercase',letterSpacing:'.05em'}}>Min Impressions</span>
          <BtnGroup opts={IMP_OPTS} val={minImp} onChange={setMinImp}/>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:7}}>
          <span style={{fontSize:10,fontWeight:700,color:'var(--sub)',textTransform:'uppercase',letterSpacing:'.05em'}}>Max CTR</span>
          <BtnGroup opts={CTR_OPTS} val={maxCtr} onChange={setMaxCtr}/>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:7}}>
          <span style={{fontSize:10,fontWeight:700,color:'var(--sub)',textTransform:'uppercase',letterSpacing:'.05em'}}>Position</span>
          <BtnGroup opts={POS_OPTS} val={maxPos} onChange={setMaxPos}/>
        </div>
        <div style={{marginLeft:'auto',alignSelf:'center'}}>
          <span style={{fontSize:12,fontWeight:700,color:'var(--tx)',padding:'6px 14px',background:'var(--bdr)',borderRadius:20}}>{rows.length} pages</span>
        </div>
      </div>

      {/* Position buckets */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
        {[
          {lbl:'🟢 Top 3',f:r=>r.position<=3,color:'#22c55e'},
          {lbl:'🔵 Pos 4–10',f:r=>r.position>3&&r.position<=10,color:'#3b82f6'},
          {lbl:'🟡 Pos 11–20',f:r=>r.position>10&&r.position<=20,color:'#f59e0b'},
        ].map(b=>{
          const bR=rows.filter(b.f);
          const bO=bR.reduce((s,r)=>s+r.oppClicks,0);
          return(
            <div key={b.lbl} className="card rounded-xl" style={{padding:'14px 16px',borderTop:'3px solid '+b.color,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:'var(--sub)',marginBottom:4}}>{b.lbl}</div>
                <div style={{fontSize:22,fontWeight:800,color:b.color}}>{bR.length}<span style={{fontSize:12,fontWeight:400,color:'var(--sub)',marginLeft:4}}>pages</span></div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:10,color:'var(--sub)',textTransform:'uppercase',letterSpacing:'.04em'}}>Opp. clicks</div>
                <div style={{fontSize:20,fontWeight:800,color:'#22c55e'}}>+{fmt(bO)}</div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Table */}
      {rows.length===0?(
        <div className="card rounded-xl" style={{padding:'56px 24px',textAlign:'center',color:'var(--sub)'}}>
          <div style={{fontSize:36,marginBottom:12}}>🔍</div>
          <div style={{fontSize:15,fontWeight:700,color:'var(--tx)',marginBottom:6}}>No pages match</div>
          <div style={{fontSize:13}}>Try increasing Max CTR or lowering Min Impressions</div>
        </div>
      ):(
        <div className="card rounded-xl overflow-hidden">
          <div style={{padding:'12px 18px',borderBottom:'1px solid var(--bdr)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style={{fontSize:13,fontWeight:700,color:'var(--tx)'}}>{rows.length} pages with CTR opportunity</span>
            <span style={{fontSize:11,color:'var(--sub)'}}>Click headers to sort · CTR bar = actual vs benchmark</span>
          </div>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
              <thead>
                <tr style={{background:'var(--bdr)'}}>
                  <th style={{padding:'9px 14px',textAlign:'left',color:'var(--sub)',fontWeight:700,fontSize:10,whiteSpace:'nowrap',letterSpacing:'.04em',width:300}}>PAGE</th>
                  <th onClick={()=>toggleSort('impressions')} style={{padding:'9px 12px',textAlign:'right',color:sortKey==='impressions'?'#3b82f6':'var(--sub)',fontWeight:700,fontSize:10,cursor:'pointer',userSelect:'none',whiteSpace:'nowrap',letterSpacing:'.04em'}}>IMPR{sortIcon('impressions')}</th>
                  <th onClick={()=>toggleSort('clicks')} style={{padding:'9px 12px',textAlign:'right',color:sortKey==='clicks'?'#3b82f6':'var(--sub)',fontWeight:700,fontSize:10,cursor:'pointer',userSelect:'none',whiteSpace:'nowrap',letterSpacing:'.04em'}}>CLICKS{sortIcon('clicks')}</th>
                  <th onClick={()=>toggleSort('ctrPct')} style={{padding:'9px 14px',textAlign:'center',color:sortKey==='ctrPct'?'#3b82f6':'var(--sub)',fontWeight:700,fontSize:10,cursor:'pointer',userSelect:'none',whiteSpace:'nowrap',letterSpacing:'.04em',minWidth:190}}>CTR vs EXPECTED{sortIcon('ctrPct')}</th>
                  <th onClick={()=>toggleSort('gap')} style={{padding:'9px 12px',textAlign:'right',color:sortKey==='gap'?'#3b82f6':'var(--sub)',fontWeight:700,fontSize:10,cursor:'pointer',userSelect:'none',whiteSpace:'nowrap',letterSpacing:'.04em'}}>GAP{sortIcon('gap')}</th>
                  <th onClick={()=>toggleSort('position')} style={{padding:'9px 12px',textAlign:'right',color:sortKey==='position'?'#3b82f6':'var(--sub)',fontWeight:700,fontSize:10,cursor:'pointer',userSelect:'none',whiteSpace:'nowrap',letterSpacing:'.04em'}}>POS{sortIcon('position')}</th>
                  <th onClick={()=>toggleSort('oppClicks')} style={{padding:'9px 12px',textAlign:'right',color:sortKey==='oppClicks'?'#3b82f6':'var(--sub)',fontWeight:700,fontSize:10,cursor:'pointer',userSelect:'none',whiteSpace:'nowrap',letterSpacing:'.04em'}}>OPP CLICKS{sortIcon('oppClicks')}</th>
                  <th style={{padding:'9px 12px',textAlign:'center',color:'var(--sub)',fontWeight:700,fontSize:10,whiteSpace:'nowrap',letterSpacing:'.04em'}}>PRIORITY</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((r,i)=>{
                  const posColor=r.position<=3?'#22c55e':r.position<=10?'#3b82f6':'#f59e0b';
                  const barPct=Math.min(r.ctrPct/Math.max(r.exp,0.1)*100,100);
                  return(
                    <tr key={r.key} className="row-hover" style={{borderBottom:'1px solid var(--bdr)',background:i%2===0?'transparent':'rgba(0,0,0,.018)'}}>
                      <td style={{padding:'10px 14px',maxWidth:300}}>
                        <a href={r.key} target="_blank" rel="noreferrer" title={r.key}
                          style={{color:'var(--tx)',textDecoration:'none',fontSize:11,display:'block',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:288}}>
                          {r.key.replace(/^https?:\/\/(www\.)?bankbazaar\.com/,'')}
                        </a>
                      </td>
                      <td style={{textAlign:'right',padding:'10px 12px',fontWeight:700,color:'#3b82f6'}}>{fmt(r.impressions)}</td>
                      <td style={{textAlign:'right',padding:'10px 12px',color:'var(--tx)'}}>{fmt(r.clicks)}</td>
                      <td style={{padding:'10px 14px',minWidth:190}}>
                        <div style={{display:'flex',alignItems:'center',gap:7}}>
                          <span style={{fontSize:11,fontWeight:800,color:'#ef4444',minWidth:38,textAlign:'right'}}>{r.ctrPct}%</span>
                          <div style={{flex:1,position:'relative',height:7,background:'rgba(34,197,94,.15)',borderRadius:4}}>
                            <div style={{position:'absolute',inset:'0 auto 0 0',width:barPct+'%',background:'linear-gradient(90deg,#ef4444,#f97316)',borderRadius:4,transition:'width .3s'}}></div>
                          </div>
                          <span style={{fontSize:11,color:'#22c55e',fontWeight:600,minWidth:34}}>{r.exp}%</span>
                        </div>
                        <div style={{display:'flex',justifyContent:'space-between',marginTop:2,fontSize:9,color:'var(--sub)',paddingLeft:46}}>
                          <span>actual</span><span style={{color:'#22c55e'}}>benchmark</span>
                        </div>
                      </td>
                      <td style={{textAlign:'right',padding:'10px 12px',color:'#ef4444',fontWeight:800}}>-{r.gap}%</td>
                      <td style={{textAlign:'right',padding:'10px 12px'}}>
                        <span style={{color:posColor,fontWeight:700,fontSize:13}}>{r.position.toFixed(1)}</span>
                      </td>
                      <td style={{textAlign:'right',padding:'10px 12px'}}>
                        <span style={{color:'#22c55e',fontWeight:800,fontSize:13}}>+{fmt(r.oppClicks)}</span>
                      </td>
                      <td style={{textAlign:'center',padding:'10px 12px'}}>
                        <span style={{display:'inline-block',padding:'3px 9px',borderRadius:20,background:r.pri.bg,color:r.pri.color,fontWeight:700,fontSize:10,letterSpacing:'.03em',whiteSpace:'nowrap'}}>
                          {r.pri.lbl}
                        </span>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}
