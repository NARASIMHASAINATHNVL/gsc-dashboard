  {id:'analytics',lbl:'📊 GA4 Analytics'},
  {id:'ctr',lbl:'👁 CTR Gaps'},
];

/* ─── APP ─── */
const DASHBOARD_PASSWORD='bankbazaar@gsc2024';
function LoginScreen({onAuth}){
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [show,setShow]=useState(false);
  const [captchaQ,setCaptchaQ]=useState(null);
  const [captchaA,setCaptchaA]=useState('');
  const [err,setErr]=useState('');
  const [attempts,setAttempts]=useState(0);
  const [locked,setLocked]=useState(false);
  const [lockSecs,setLockSecs]=useState(0);
  const hpRef=useRef(null);

  const genCaptcha=()=>{
    const r=()=>Math.floor(Math.random()*8)+2;
    const type=Math.floor(Math.random()*3);
    if(type===0){const a=r(),b=r();setCaptchaQ({q:a+' + '+b,a:a+b});}
    else if(type===1){const a=r()+8,b=r();setCaptchaQ({q:a+' − '+b,a:a-b});}
    else{const a=r(),b=Math.floor(Math.random()*4)+2;setCaptchaQ({q:a+' × '+b,a:a*b});}
    setCaptchaA('');
  };

  useEffect(()=>{genCaptcha();},[]);

  useEffect(()=>{
    if(!locked)return;
    if(lockSecs<=0){setLocked(false);return;}
    const t=setTimeout(()=>setLockSecs(n=>n-1),1000);
    return()=>clearTimeout(t);
  },[locked,lockSecs]);

  const inputSt={width:'100%',padding:'10px 14px',borderRadius:8,border:'1px solid rgba(255,255,255,.15)',background:'rgba(255,255,255,.07)',color:'#fff',fontSize:14,outline:'none',boxSizing:'border-box'};
  const labelSt={fontSize:10,fontWeight:700,color:'rgba(255,255,255,.45)',textTransform:'uppercase',letterSpacing:'.06em',display:'block',marginBottom:6};

  const submit=()=>{
    // Honeypot — bots fill hidden fields
    if(hpRef.current&&hpRef.current.value)return;
    if(locked){setErr('Account locked. Wait '+lockSecs+' seconds.');return;}
    setErr('');

    // 1. Email domain check
    const em=email.trim().toLowerCase();
    if(!em||!em.endsWith('@bankbazaar.com')){
      setErr('Only @bankbazaar.com email addresses are permitted.');return;
    }

    // 2. CAPTCHA
    if(!captchaQ||parseInt(captchaA,10)!==captchaQ.a){
      setErr('Wrong CAPTCHA answer. Try the new question below.');
      genCaptcha();return;
    }

    // 3. Password
    if(pw!==DASHBOARD_PASSWORD){
      const n=attempts+1;
      setAttempts(n);
      if(n>=3){setLocked(true);setLockSecs(30);setErr('3 failed attempts — locked for 30 seconds.');}
      else{setErr('Incorrect password. '+(3-n)+' attempt'+(3-n===1?'':'s')+' remaining.');}
      setPw('');genCaptcha();return;
    }

    onAuth();
  };

  return(
    <div className="login-wrap">
      <div className="login-card fi" style={{maxWidth:380}}>
        {/* Header */}
        <div style={{textAlign:'center',marginBottom:24}}>
          <span style={{background:'#ff6600',color:'#fff',padding:'4px 14px',borderRadius:8,fontSize:13,fontWeight:800,letterSpacing:'.05em'}}>GSC PRO</span>
          <div style={{fontSize:19,fontWeight:800,marginTop:14,color:'#fff'}}>BankBazaar SEO Dashboard</div>
          <div style={{fontSize:12,color:'rgba(255,255,255,.4)',marginTop:5}}>🔐 Restricted — BankBazaar employees only</div>
        </div>

        {/* Honeypot — visually hidden */}
        <input ref={hpRef} type="text" name="username" tabIndex={-1} aria-hidden="true"
          style={{position:'absolute',left:'-9999px',width:1,height:1,opacity:0}} autoComplete="off"/>

        {/* Email */}
        <div style={{marginBottom:14}}>
          <label style={labelSt}>Work Email</label>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&submit()}
            placeholder="yourname@bankbazaar.com" autoFocus autoComplete="email"
            style={inputSt}/>
        </div>

        {/* Password */}
        <div style={{marginBottom:14}}>
          <label style={labelSt}>Password</label>
          <div style={{position:'relative'}}>
            <input type={show?'text':'password'} value={pw} onChange={e=>setPw(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&submit()}
              placeholder="Dashboard password" autoComplete="current-password"
              style={{...inputSt,paddingRight:40}}/>
            <button onClick={()=>setShow(s=>!s)}
              style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'rgba(255,255,255,.4)',fontSize:15,lineHeight:1}}>
              {show?'🙈':'👁'}
            </button>
          </div>
        </div>

        {/* CAPTCHA */}
        {captchaQ&&(
          <div style={{marginBottom:16,background:'rgba(255,102,0,.07)',border:'1px solid rgba(255,102,0,.2)',borderRadius:10,padding:'14px'}}>
            <label style={labelSt}>🤖 Verify you're human</label>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{flex:1,background:'rgba(0,0,0,.3)',borderRadius:8,padding:'10px 14px',textAlign:'center',fontFamily:'monospace',fontSize:20,fontWeight:800,color:'#ff8533',letterSpacing:'.08em'}}>
                {captchaQ.q} = ?
              </div>
              <input type="number" value={captchaA} onChange={e=>setCaptchaA(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&submit()}
                placeholder="?"
                style={{width:72,padding:'10px 8px',borderRadius:8,border:'1px solid rgba(255,255,255,.2)',background:'rgba(255,255,255,.07)',color:'#fff',fontSize:18,fontWeight:800,textAlign:'center',outline:'none'}}/>
              <button onClick={genCaptcha} title="New question"
                style={{background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.1)',borderRadius:8,width:36,height:36,cursor:'pointer',color:'rgba(255,255,255,.5)',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>
                🔄
              </button>
            </div>
          </div>
        )}

        {/* Error */}
        {err&&(
          <div style={{fontSize:12,color:'#fca5a5',background:'rgba(239,68,68,.12)',border:'1px solid rgba(239,68,68,.25)',borderRadius:8,padding:'9px 12px',marginBottom:14,textAlign:'center'}}>
            ⚠️ {err}
          </div>
        )}

        {/* Submit */}
        <button onClick={submit} disabled={locked}
          style={{width:'100%',padding:'12px',borderRadius:8,background:locked?'rgba(255,255,255,.08)':'linear-gradient(135deg,#ff6600,#ff8533)',color:locked?'rgba(255,255,255,.3)':'#fff',border:'none',cursor:locked?'not-allowed':'pointer',fontWeight:700,fontSize:14,transition:'all .2s',letterSpacing:'.02em'}}>
          {locked?'🔒 Locked ('+lockSecs+'s)':'Unlock Dashboard →'}
        </button>

        <div style={{textAlign:'center',marginTop:14,fontSize:11,color:'rgba(255,255,255,.2)'}}>
          Unauthorised access is strictly prohibited
        </div>
      </div>
    </div>
  );
}

function App(){
  /* ── hooks first (before any early return) ── */
  const [src,setSrc]=useState('ahrefs');
  const [tab,setTab]=useState('overview');
  const [dark,setDark]=useState(false);
  const [ahrefsData,setAhrefsData]=useState(null);
  const [gscData,setGscData]=useState(null);
  const [authed,setAuthed]=useState(false);
  const [gscMeta,setGscMeta]=useState(null);
  const [editDates,setEditDates]=useState(null);
  const [editSite,setEditSite]=useState('');
  const [preset,setPreset]=useState('1m');
  const [refetching,setRefetching]=useState(false);
  const [mobileMenuOpen,setMobileMenuOpen]=useState(false);

  useEffect(()=>{
    const curLbl=(_D.current&&_D.current.label)||'May 28–Jun 25, 2026';
    const prvLbl=(_D.previous&&_D.previous.label)||'Apr 30–May 27, 2026';
    setAhrefsData({cp:computeComp(SP_C,SP_P),ck:computeComp(SQ_C,SQ_P),label:`Ahrefs GSC · ${curLbl} vs ${prvLbl}`});
  },[]);
  useEffect(()=>{document.body.classList.toggle('dark',dark);},[dark]);

  const activeData=src==='ahrefs'?ahrefsData:gscData;
  const cp=activeData?.cp;
  const ck=activeData?.ck||[];
  const label=activeData?.label||'';
  const alertCount=useMemo(()=>cp?generateAlerts(cp).filter(a=>a.sev==='c').length:0,[cp]);
  const decayCount=useMemo(()=>cp?detectDecay(cp).length:0,[cp]);
  const totClicks=useMemo(()=>cp?cp.reduce((s,r)=>s+r.clicks,0):0,[cp]);
  const prevTotClicks=useMemo(()=>cp?cp.reduce((s,r)=>s+(r.prevClicks||0),0):0,[cp]);
  const clickPct=pctC(totClicks,prevTotClicks);

  const PRESETS=[
    {id:'1m',label:'Last 1 Month vs Prev Month'},
    {id:'3m',label:'Last 3 Months vs Prev Period'},
    {id:'6m',label:'Last 6 Months vs Prev Period'},
    {id:'custom',label:'Custom Date Range'},
  ];
  const presetToDates=(p)=>{
    const today=new Date();
    const fmtD=d=>d.toISOString().split('T')[0];
    const sub=(d,days)=>{const r=new Date(d);r.setDate(r.getDate()-days);return r;};
    if(p==='1m'){const e=sub(today,1),s=sub(e,29),pe=sub(s,1),ps=sub(pe,29);return{s:fmtD(s),e:fmtD(e),ps:fmtD(ps),pe:fmtD(pe)};}
    if(p==='3m'){const e=sub(today,1),s=sub(e,89),pe=sub(s,1),ps=sub(pe,89);return{s:fmtD(s),e:fmtD(e),ps:fmtD(ps),pe:fmtD(pe)};}
    if(p==='6m'){const e=sub(today,1),s=sub(e,179),pe=sub(s,1),ps=sub(pe,179);return{s:fmtD(s),e:fmtD(e),ps:fmtD(ps),pe:fmtD(pe)};}
    return null;
  };
  const handlePresetChange=(p)=>{setPreset(p);if(p!=='custom'){const d=presetToDates(p);if(d)setEditDates(d);}};

  const applyChanges=async()=>{
    if(!gscMeta||!editDates)return;
    const{token,sites}=gscMeta;
    const d=editDates;
    const activeSite=editSite||gscMeta.site;
    if(!d.s||!d.e||!d.ps||!d.pe)return;
    setRefetching(true);setMobileMenuOpen(false);
    const fetchG=async(start,end,dim)=>{
      const r=await fetch('https://www.googleapis.com/webmasters/v3/sites/'+encodeURIComponent(activeSite)+'/searchAnalytics/query',
        {method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
         body:JSON.stringify({startDate:start,endDate:end,dimensions:[dim==='pages'?'page':'query'],rowLimit:500,dataState:'final'})});
      const j=await r.json();
      if(j.error)throw new Error(j.error.message);
      return(j.rows||[]).map(row=>({key:row.keys[0],clicks:row.clicks,impressions:row.impressions,ctr:row.ctr,position:row.position}));
    };
    try{
      const[pC,pP,qC,qP]=await Promise.all([fetchG(d.s,d.e,'pages'),fetchG(d.ps,d.pe,'pages'),fetchG(d.s,d.e,'queries'),fetchG(d.ps,d.pe,'queries')]);
      setGscMeta(m=>({...m,site:activeSite,dates:d}));
      setGscData({cp:computeComp(pC,pP),ck:computeComp(qC,qP),label:activeSite+' · '+d.s+' vs '+d.ps,_meta:{token,site:activeSite,sites,dates:d}});
    }catch(e){alert('GSC error: '+e.message);}
    setRefetching(false);
  };

  const renderAnalysis=()=>{
    if(tab==='analytics') return <GA4Page/>;
    if(tab==='ctr') return <CTRGapsPage cp={cp}/>;
    if(!cp){
      return(
        <div className="text-center py-20" style={{color:'var(--sub)'}}>
          {src==='ahrefs'?'Loading pre-baked Ahrefs data...':'Connect to Google Search Console to load live data →'}
        </div>
      );
    }
    switch(tab){
      case 'overview':  return <OverviewPage cp={cp} ck={ck} label={label}/>;
      case 'pages':     return <PagesPage cp={cp}/>;
      case 'keywords':  return <KeywordsPage ck={ck}/>;
      case 'tis':       return <TrafficScorePage cp={cp}/>;
      case 'alerts':    return <AlertsPage cp={cp}/>;
      case 'decay':     return <DecayPage cp={cp}/>;
      case 'groups':    return <URLGroupsPage cp={cp}/>;
      case 'ai':        return <AIAnalysisPage cp={cp} ck={ck}/>;
      case 'forecast':  return <ForecastPage trend={TREND}/>;
      case 'history':   return <HistoryPage/>;
      case 'reports':   return <ReportsPage cp={cp} ck={ck} label={label}/>;
      default: return null;
    }
  };

  if(!authed) return <LoginScreen onAuth={()=>setAuthed(true)}/>;

  return(
    <div className={dark?'dark':''} style={{minHeight:'100vh'}}>
      <header style={{position:'sticky',top:0,zIndex:50,background:'linear-gradient(90deg,#0f172a 0%,#1e293b 60%,#431407 100%)',boxShadow:'0 2px 20px rgba(0,0,0,.4)',borderBottom:'1px solid rgba(255,102,0,.25)'}}>
        <div style={{maxWidth:1280,margin:'0 auto',padding:'0 16px',display:'flex',alignItems:'center',gap:10,height:54}}>
          <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
            <span style={{background:'#ff6600',color:'#fff',padding:'2px 8px',borderRadius:6,fontSize:11,fontWeight:700}}>GSC PRO</span>
            {cp&&<span style={{fontSize:12,color:'rgba(255,255,255,.65)'}}>{fmt(totClicks)} clicks{clickPct!=null&&<span style={{color:clickPct>0?'#22c55e':'#ef4444'}}> {sign(clickPct)}{clickPct.toFixed(1)}%</span>}</span>}
          </div>
          <div style={{display:'flex',gap:4,padding:'3px',borderRadius:8,background:'rgba(255,255,255,.08)'}}>
            <button className={`src-btn ${src==='ahrefs'?'src-on':'src-off'} text-xs`} onClick={()=>{setSrc('ahrefs');setTab('overview');}}>📡 Ahrefs</button>
            <button className={`src-btn ${src==='gsc'?'src-on':'src-off'} text-xs`} onClick={()=>{setSrc('gsc');setTab(gscData?'overview':'connect');}}>🔑 GSC Live</button>
          </div>
          {gscMeta&&src==='gsc'&&editDates&&(
            <div className="hdr-controls mobile-hide" style={{flex:1,display:'flex',alignItems:'flex-end',gap:8}}>
              {gscMeta.sites&&gscMeta.sites.length>1&&(
                <div style={{display:'flex',flexDirection:'column',gap:2}}>
                  <span className="hdr-label">Property</span>
                  <select className="hdr-input" value={editSite} onChange={e=>setEditSite(e.target.value)} style={{maxWidth:170}}>
                    {(gscMeta.sites||[]).map(s=><option key={s} value={s}>{s.replace(/^https?:\/\/(www\.)?/,'').replace(/\/$/,'')}</option>)}
                  </select>
                </div>
              )}
              <div style={{display:'flex',flexDirection:'column',gap:2}}>
                <span className="hdr-label">Date Range</span>
                <select className="hdr-input" value={preset} onChange={e=>handlePresetChange(e.target.value)} style={{minWidth:200}}>
                  {PRESETS.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}
                </select>
              </div>
              {preset==='custom'&&(
                <>
                  <div style={{display:'flex',flexDirection:'column',gap:2}}>
                    <span className="hdr-label">Current Period</span>
                    <div style={{display:'flex',gap:3,alignItems:'center'}}>
                      <input className="hdr-input" type="date" value={editDates.s} onChange={e=>setEditDates(d=>({...d,s:e.target.value}))}/>
                      <span style={{color:'rgba(255,255,255,.35)',fontSize:10}}>to</span>
                      <input className="hdr-input" type="date" value={editDates.e} onChange={e=>setEditDates(d=>({...d,e:e.target.value}))}/>
                    </div>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:2}}>
                    <span className="hdr-label">Compare Period</span>
                    <div style={{display:'flex',gap:3,alignItems:'center'}}>
                      <input className="hdr-input" type="date" value={editDates.ps} onChange={e=>setEditDates(d=>({...d,ps:e.target.value}))}/>
                      <span style={{color:'rgba(255,255,255,.35)',fontSize:10}}>to</span>
                      <input className="hdr-input" type="date" value={editDates.pe} onChange={e=>setEditDates(d=>({...d,pe:e.target.value}))}/>
                    </div>
                  </div>
                </>
              )}
              <button className="apply-btn" onClick={applyChanges} disabled={refetching}>{refetching?'⟳ Loading':'Apply'}</button>
            </div>
          )}
          <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}}>
            {alertCount>0&&<span style={{fontSize:11,padding:'2px 8px',borderRadius:12,fontWeight:700,background:'#ef4444',color:'#fff'}}>{alertCount} critical</span>}
            {decayCount>0&&<span style={{fontSize:11,padding:'2px 8px',borderRadius:12,fontWeight:700,background:'#f59e0b',color:'#fff'}}>{decayCount} decay</span>}
            <button onClick={()=>setDark(d=>!d)} style={{width:32,height:32,borderRadius:'50%',border:'1px solid rgba(255,255,255,.15)',background:'rgba(255,255,255,.08)',cursor:'pointer',fontSize:15}}>
              {dark?'☀️':'🌙'}
            </button>
            <button className="hdr-hamburger" style={{display:'none',width:32,height:32,borderRadius:6,border:'1px solid rgba(255,255,255,.15)',background:'rgba(255,255,255,.08)',cursor:'pointer',alignItems:'center',justifyContent:'center',fontSize:16}} onClick={()=>setMobileMenuOpen(m=>!m)}>☰</button>
          </div>
        </div>
        {(src==='ahrefs'||gscData||tab==='analytics')&&(
          <div style={{maxWidth:1280,margin:'0 auto',display:'flex',overflowX:'auto',scrollbarWidth:'none',padding:'0 8px'}}>
            {ANALYSIS_TABS.map(t=>(
              <button key={t.id} className={`text-xs px-3 py-2.5 whitespace-nowrap ${tab===t.id?'t-active':'t-inactive'}`} onClick={()=>setTab(t.id)}>
                {t.lbl}
                {t.id==='alerts'&&alertCount>0&&<span className="ml-1 text-xs font-bold" style={{color:'#ef4444'}}>{alertCount}</span>}
                {t.id==='decay'&&decayCount>0&&<span className="ml-1 text-xs font-bold" style={{color:'#f59e0b'}}>{decayCount}</span>}
              </button>
            ))}
          </div>
        )}
        {mobileMenuOpen&&gscMeta&&src==='gsc'&&editDates&&(
          <div style={{background:'rgba(0,0,0,.88)',padding:'12px 16px',display:'flex',flexDirection:'column',gap:10}}>
            {gscMeta.sites&&gscMeta.sites.length>1&&(
              <div style={{display:'flex',flexDirection:'column',gap:4}}>
                <span className="hdr-label">Property</span>
                <select className="hdr-input" value={editSite} onChange={e=>setEditSite(e.target.value)} style={{width:'100%'}}>
                  {(gscMeta.sites||[]).map(s=><option key={s} value={s}>{s.replace(/^https?:\/\/(www\.)?/,'').replace(/\/$/,'')}</option>)}
                </select>
              </div>
            )}
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              <span className="hdr-label">Date Range</span>
              <select className="hdr-input" value={preset} onChange={e=>handlePresetChange(e.target.value)} style={{width:'100%'}}>
                {PRESETS.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}
              </select>
            </div>
            {preset==='custom'&&(
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                <div><span className="hdr-label">Current Start</span><input className="hdr-input" type="date" value={editDates.s} onChange={e=>setEditDates(d=>({...d,s:e.target.value}))} style={{width:'100%',marginTop:4}}/></div>
                <div><span className="hdr-label">Current End</span><input className="hdr-input" type="date" value={editDates.e} onChange={e=>setEditDates(d=>({...d,e:e.target.value}))} style={{width:'100%',marginTop:4}}/></div>
                <div><span className="hdr-label">Compare Start</span><input className="hdr-input" type="date" value={editDates.ps} onChange={e=>setEditDates(d=>({...d,ps:e.target.value}))} style={{width:'100%',marginTop:4}}/></div>
                <div><span className="hdr-label">Compare End</span><input className="hdr-input" type="date" value={editDates.pe} onChange={e=>setEditDates(d=>({...d,pe:e.target.value}))} style={{width:'100%',marginTop:4}}/></div>
              </div>
            )}
            <button className="apply-btn" onClick={applyChanges} disabled={refetching} style={{width:'100%'}}>{refetching?'⟳ Loading':'Apply'}</button>
          </div>
        )}
      </header>

      <main style={{maxWidth:1280,margin:'0 auto',padding:'24px 16px'}}>
        {src==='ahrefs'&&(
          <>
            {tab==='connect'||(!ahrefsData&&tab!=='connect')
              ?<ImportPage onLoad={d=>{setAhrefsData(d);setTab('overview');}}/>
              :renderAnalysis()
            }
          </>
        )}
        {src==='gsc'&&(
          <>
            {!gscData
              ?<GscOAuthPage onLoad={d=>{if(d._meta){setGscMeta(d._meta);setEditDates({...d._meta.dates});setEditSite(d._meta.site);setPreset('1m');}setGscData(d);setTab('overview');}}/>
              :renderAnalysis()
            }
          </>
        )}
      </main>

      <footer style={{textAlign:'center',padding:'16px',fontSize:12,color:'var(--sub)'}}>
        GSC Analytics Pro · BankBazaar.com · {label}
      </footer>
    </div>
  );
}

try{
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
}catch(e){
  document.getElementById('root').innerHTML='<div style="padding:40px;font-family:sans-serif;color:#ef4444"><b>Error:</b> '+e.message+'</div>';
}
</script>
</body>
